<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <pattern id="grid-s" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.5" fill="#1a1b2e"/>
    </pattern>
    <linearGradient id="glow-green-s" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3ecf8e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3ecf8e" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur-s">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0d0e17"/>
  <rect width="1200" height="630" fill="url(#grid-s)"/>

  <!-- Subtle horizontal scan lines -->
  <g opacity="0.03">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#3ecf8e" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#3ecf8e" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#3ecf8e" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#3ecf8e" stroke-width="0.5"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#3ecf8e" stroke-width="0.5"/>
  </g>

  <!-- Corner ornaments -->
  <g stroke="#555566" stroke-width="1.5" fill="none">
    <polyline points="20,50 20,20 50,20"/>
    <polyline points="1150,20 1180,20 1180,50"/>
    <polyline points="1180,580 1180,610 1150,610"/>
    <polyline points="50,610 20,610 20,580"/>
  </g>

  <!-- MICROGRAPHICS watermark -->
  <text x="60" y="42" font-family="monospace" font-size="10" fill="#555566" letter-spacing="3">MICROGRAPHICS</text>

  <!-- Glow backdrop -->
  <ellipse cx="600" cy="300" rx="350" ry="150" fill="#3ecf8e" opacity="0.02" filter="url(#blur-s)"/>

  <!-- === SIGNAL BARS (5 ascending) === -->
  <g transform="translate(120, 180)">
    <rect x="0" y="120" width="28" height="40" rx="2" fill="#3ecf8e" opacity="0.5"/>
    <rect x="40" y="90" width="28" height="70" rx="2" fill="#3ecf8e" opacity="0.65"/>
    <rect x="80" y="60" width="28" height="100" rx="2" fill="#3ecf8e" opacity="0.8"/>
    <rect x="120" y="30" width="28" height="130" rx="2" fill="#3ecf8e" opacity="0.9"/>
    <rect x="160" y="0" width="28" height="160" rx="2" fill="#3ecf8e"/>
    <!-- Signal level text -->
    <text x="94" y="185" font-family="monospace" font-size="11" fill="#9a9aaa" text-anchor="middle">SIGNAL: 87%</text>
  </g>

  <!-- === HEARTBEAT LINE === -->
  <g transform="translate(350, 200)">
    <polyline points="0,80 30,80 45,80 55,40 65,110 75,60 85,80 120,80 150,80 165,80 175,35 185,115 195,55 205,80 240,80 280,80"
      fill="none" stroke="#3ecf8e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="0,80 30,80 45,80 55,40 65,110 75,60 85,80 120,80 150,80 165,80 175,35 185,115 195,55 205,80 240,80 280,80"
      fill="none" stroke="#3ecf8e" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.15" filter="url(#blur-s)"/>
    <text x="140" y="120" font-family="monospace" font-size="11" fill="#9a9aaa" text-anchor="middle">72 BPM</text>
  </g>

  <!-- === STATUS DOTS === -->
  <g transform="translate(700, 210)">
    <circle cx="0" cy="0" r="12" fill="#3ecf8e"/>
    <circle cx="0" cy="0" r="18" fill="none" stroke="#3ecf8e" stroke-width="1" opacity="0.3"/>
    <text x="0" y="35" font-family="monospace" font-size="9" fill="#3ecf8e" text-anchor="middle">ONLINE</text>

    <circle cx="70" cy="0" r="12" fill="#f5a623"/>
    <circle cx="70" cy="0" r="18" fill="none" stroke="#f5a623" stroke-width="1" opacity="0.3"/>
    <text x="70" y="35" font-family="monospace" font-size="9" fill="#f5a623" text-anchor="middle">WARN</text>

    <circle cx="140" cy="0" r="12" fill="#e05252"/>
    <circle cx="140" cy="0" r="18" fill="none" stroke="#e05252" stroke-width="1" opacity="0.3"/>
    <text x="140" y="35" font-family="monospace" font-size="9" fill="#e05252" text-anchor="middle">CRIT</text>
  </g>

  <!-- === WAVEFORM === -->
  <g transform="translate(900, 190)">
    <polyline points="0,70 10,50 20,85 30,30 40,90 50,45 60,75 70,25 80,80 90,55 100,70 110,35 120,85 130,40 140,70 150,55 160,75 170,30 180,80"
      fill="none" stroke="#f5a623" stroke-width="1.5" opacity="0.8"/>
    <line x1="0" y1="55" x2="180" y2="55" stroke="#555566" stroke-width="0.5" stroke-dasharray="3,3"/>
    <text x="90" y="110" font-family="monospace" font-size="11" fill="#9a9aaa" text-anchor="middle">440 Hz</text>
  </g>

  <!-- === BATTERY METER small === -->
  <g transform="translate(920, 330)">
    <rect x="0" y="0" width="60" height="24" rx="3" fill="none" stroke="#9a9aaa" stroke-width="1.5"/>
    <rect x="60" y="6" width="6" height="12" rx="1" fill="#9a9aaa"/>
    <rect x="3" y="3" width="40" height="18" rx="1" fill="#3ecf8e" opacity="0.8"/>
    <text x="30" y="40" font-family="monospace" font-size="9" fill="#9a9aaa" text-anchor="middle">74%</text>
  </g>

  <!-- === SYSTEM LOAD small bars === -->
  <g transform="translate(700, 310)">
    <text x="0" y="0" font-family="monospace" font-size="9" fill="#555566">SYS LOAD</text>
    <rect x="0" y="10" width="120" height="6" rx="2" fill="#1a1b2e"/>
    <rect x="0" y="10" width="85" height="6" rx="2" fill="#3ecf8e"/>
    <rect x="0" y="22" width="120" height="6" rx="2" fill="#1a1b2e"/>
    <rect x="0" y="22" width="60" height="6" rx="2" fill="#f5a623"/>
    <rect x="0" y="34" width="120" height="6" rx="2" fill="#1a1b2e"/>
    <rect x="0" y="34" width="110" height="6" rx="2" fill="#e05252"/>
  </g>

  <!-- Title -->
  <text x="600" y="460" font-family="monospace" font-size="52" fill="#3ecf8e" text-anchor="middle" font-weight="bold" letter-spacing="6">SIGNALS PACK</text>
  <text x="600" y="495" font-family="monospace" font-size="20" fill="#9a9aaa" text-anchor="middle" letter-spacing="4">23 Components</text>

  <!-- Accent line under title -->
  <line x1="380" y1="510" x2="820" y2="510" stroke="#3ecf8e" stroke-width="1" opacity="0.2"/>

  <!-- Component names at bottom -->
  <text x="600" y="570" font-family="monospace" font-size="11" fill="#555566" text-anchor="middle" letter-spacing="1">SignalMeter  ·  PulseTag  ·  StatusLight  ·  HeartbeatLine  ·  BatteryMeter  ·  SystemLoad...</text>
</svg>