<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <pattern id="grid-c" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.5" fill="#1a1b2e"/>
    </pattern>
    <filter id="blur-c">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0d0e17"/>
  <rect width="1200" height="630" fill="url(#grid-c)"/>

  <!-- Corner ornaments -->
  <g stroke="#555566" stroke-width="1.5" fill="none">
    <polyline points="20,50 20,20 50,20"/>
    <polyline points="1150,20 1180,20 1180,50"/>
    <polyline points="1180,580 1180,610 1150,610"/>
    <polyline points="50,610 20,610 20,580"/>
  </g>

  <text x="60" y="42" font-family="monospace" font-size="10" fill="#555566" letter-spacing="3">MICROGRAPHICS</text>

  <ellipse cx="600" cy="260" rx="400" ry="150" fill="#3ecf8e" opacity="0.015" filter="url(#blur-c)"/>

  <!-- === BARCODE === -->
  <g transform="translate(100, 170)">
    <rect x="0" y="0" width="3" height="100" fill="#e8e8e8"/>
    <rect x="5" y="0" width="1" height="100" fill="#e8e8e8"/>
    <rect x="8" y="0" width="2" height="100" fill="#e8e8e8"/>
    <rect x="13" y="0" width="3" height="100" fill="#e8e8e8"/>
    <rect x="18" y="0" width="1" height="100" fill="#e8e8e8"/>
    <rect x="21" y="0" width="2" height="100" fill="#e8e8e8"/>
    <rect x="25" y="0" width="1" height="100" fill="#e8e8e8"/>
    <rect x="29" y="0" width="3" height="100" fill="#e8e8e8"/>
    <rect x="34" y="0" width="2" height="100" fill="#e8e8e8"/>
    <rect x="38" y="0" width="1" height="100" fill="#e8e8e8"/>
    <rect x="42" y="0" width="3" height="100" fill="#e8e8e8"/>
    <rect x="47" y="0" width="1" height="100" fill="#e8e8e8"/>
    <rect x="50" y="0" width="2" height="100" fill="#e8e8e8"/>
    <rect x="55" y="0" width="3" height="100" fill="#e8e8e8"/>
    <rect x="60" y="0" width="1" height="100" fill="#e8e8e8"/>
    <rect x="63" y="0" width="2" height="100" fill="#e8e8e8"/>
    <rect x="68" y="0" width="1" height="100" fill="#e8e8e8"/>
    <rect x="71" y="0" width="3" height="100" fill="#e8e8e8"/>
    <rect x="76" y="0" width="2" height="100" fill="#e8e8e8"/>
    <rect x="80" y="0" width="1" height="100" fill="#e8e8e8"/>
    <rect x="84" y="0" width="2" height="100" fill="#e8e8e8"/>
    <rect x="88" y="0" width="3" height="100" fill="#e8e8e8"/>
    <rect x="93" y="0" width="1" height="100" fill="#e8e8e8"/>
    <rect x="97" y="0" width="2" height="100" fill="#e8e8e8"/>
    <!-- Green scan line -->
    <line x1="-5" y1="45" x2="105" y2="45" stroke="#3ecf8e" stroke-width="1.5" opacity="0.6"/>
    <text x="50" y="120" font-family="monospace" font-size="10" fill="#9a9aaa" text-anchor="middle">4820173 00294</text>
    <text x="50" y="140" font-family="monospace" font-size="10" fill="#9a9aaa" text-anchor="middle">BARCODE</text>
  </g>

  <!-- === CORNER ORNAMENT (decorative, large) === -->
  <g transform="translate(300, 170)" stroke="#3ecf8e" stroke-width="2" fill="none">
    <!-- Top-left -->
    <polyline points="0,30 0,0 30,0"/>
    <polyline points="5,25 5,5 25,5" opacity="0.4"/>
    <!-- Top-right -->
    <polyline points="120,0 150,0 150,30"/>
    <polyline points="125,5 145,5 145,25" opacity="0.4"/>
    <!-- Bottom-left -->
    <polyline points="0,90 0,120 30,120"/>
    <polyline points="5,95 5,115 25,115" opacity="0.4"/>
    <!-- Bottom-right -->
    <polyline points="120,120 150,120 150,90"/>
    <polyline points="125,115 145,115 145,95" opacity="0.4"/>
    <!-- Inner content area indicator -->
    <rect x="15" y="15" width="120" height="90" fill="none" stroke="#555566" stroke-width="0.5" stroke-dasharray="3,5"/>
    <text x="75" y="65" font-family="monospace" font-size="12" fill="#9a9aaa" text-anchor="middle" stroke="none">CONTENT</text>
    <text x="75" y="155" font-family="monospace" font-size="10" fill="#9a9aaa" text-anchor="middle" stroke="none">CORNER ORNAMENT</text>
  </g>

  <!-- === DATA LABEL === -->
  <g transform="translate(530, 180)">
    <rect x="0" y="0" width="200" height="32" rx="3" fill="#0d0e17" stroke="#3ecf8e" stroke-width="1"/>
    <line x1="80" y1="0" x2="80" y2="32" stroke="#3ecf8e" stroke-width="1" opacity="0.5"/>
    <text x="40" y="21" font-family="monospace" font-size="13" fill="#555566" text-anchor="middle">MODE</text>
    <text x="140" y="21" font-family="monospace" font-size="13" fill="#3ecf8e" text-anchor="middle">ACTIVE</text>

    <!-- Second label -->
    <rect x="0" y="45" width="200" height="32" rx="3" fill="#0d0e17" stroke="#f5a623" stroke-width="1"/>
    <line x1="80" y1="45" x2="80" y2="77" stroke="#f5a623" stroke-width="1" opacity="0.5"/>
    <text x="40" y="66" font-family="monospace" font-size="13" fill="#555566" text-anchor="middle">TEMP</text>
    <text x="140" y="66" font-family="monospace" font-size="13" fill="#f5a623" text-anchor="middle">72.4°C</text>

    <text x="100" y="110" font-family="monospace" font-size="10" fill="#9a9aaa" text-anchor="middle">DATA LABELS</text>
  </g>

  <!-- === DIAMOND === -->
  <g transform="translate(810, 195)">
    <polygon points="40,0 80,40 40,80 0,40" fill="none" stroke="#3ecf8e" stroke-width="1.5"/>
    <polygon points="40,10 70,40 40,70 10,40" fill="none" stroke="#3ecf8e" stroke-width="0.5" opacity="0.4"/>
    <circle cx="40" cy="40" r="3" fill="#3ecf8e"/>
    <text x="40" y="105" font-family="monospace" font-size="10" fill="#9a9aaa" text-anchor="middle">DIAMOND</text>
  </g>

  <!-- === RULER TICK MARKS === -->
  <g transform="translate(940, 175)">
    <line x1="0" y1="0" x2="0" y2="100" stroke="#555566" stroke-width="1"/>
    <!-- Major ticks -->
    <line x1="0" y1="0" x2="20" y2="0" stroke="#e8e8e8" stroke-width="1"/>
    <text x="25" y="4" font-family="monospace" font-size="8" fill="#9a9aaa">0</text>
    <line x1="0" y1="25" x2="20" y2="25" stroke="#e8e8e8" stroke-width="1"/>
    <text x="25" y="29" font-family="monospace" font-size="8" fill="#9a9aaa">25</text>
    <line x1="0" y1="50" x2="20" y2="50" stroke="#e8e8e8" stroke-width="1"/>
    <text x="25" y="54" font-family="monospace" font-size="8" fill="#9a9aaa">50</text>
    <line x1="0" y1="75" x2="20" y2="75" stroke="#e8e8e8" stroke-width="1"/>
    <text x="25" y="79" font-family="monospace" font-size="8" fill="#9a9aaa">75</text>
    <line x1="0" y1="100" x2="20" y2="100" stroke="#e8e8e8" stroke-width="1"/>
    <text x="25" y="104" font-family="monospace" font-size="8" fill="#9a9aaa">100</text>
    <!-- Minor ticks -->
    <line x1="0" y1="5" x2="8" y2="5" stroke="#555566" stroke-width="0.5"/>
    <line x1="0" y1="10" x2="8" y2="10" stroke="#555566" stroke-width="0.5"/>
    <line x1="0" y1="15" x2="8" y2="15" stroke="#555566" stroke-width="0.5"/>
    <line x1="0" y1="20" x2="8" y2="20" stroke="#555566" stroke-width="0.5"/>
    <line x1="0" y1="30" x2="8" y2="30" stroke="#555566" stroke-width="0.5"/>
    <line x1="0" y1="35" x2="8" y2="35" stroke="#555566" stroke-width="0.5"/>
    <line x1="0" y1="40" x2="8" y2="40" stroke="#555566" stroke-width="0.5"/>
    <line x1="0" y1="45" x2="8" y2="45" stroke="#555566" stroke-width="0.5"/>
    <line x1="0" y1="55" x2="8" y2="55" stroke="#555566" stroke-width="0.5"/>
    <line x1="0" y1="60" x2="8" y2="60" stroke="#555566" stroke-width="0.5"/>
    <line x1="0" y1="65" x2="8" y2="65" stroke="#555566" stroke-width="0.5"/>
    <line x1="0" y1="70" x2="8" y2="70" stroke="#555566" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="8" y2="80" stroke="#555566" stroke-width="0.5"/>
    <line x1="0" y1="85" x2="8" y2="85" stroke="#555566" stroke-width="0.5"/>
    <line x1="0" y1="90" x2="8" y2="90" stroke="#555566" stroke-width="0.5"/>
    <line x1="0" y1="95" x2="8" y2="95" stroke="#555566" stroke-width="0.5"/>
    <!-- Indicator -->
    <polygon points="-8,62 0,58 0,66" fill="#e05252"/>
    <text x="25" y="130" font-family="monospace" font-size="10" fill="#9a9aaa" text-anchor="middle">RULER</text>
  </g>

  <!-- === HEX GRID (small) === -->
  <g transform="translate(780, 310)" fill="none" stroke="#555566" stroke-width="0.5">
    <polygon points="20,0 40,12 40,35 20,46 0,35 0,12"/>
    <polygon points="60,0 80,12 80,35 60,46 40,35 40,12"/>
    <polygon points="100,0 120,12 120,35 100,46 80,35 80,12"/>
    <polygon points="40,46 60,58 60,81 40,92 20,81 20,58"/>
    <polygon points="80,46 100,58 100,81 80,92 60,81 60,58"/>
    <!-- Highlight one cell -->
    <polygon points="60,0 80,12 80,35 60,46 40,35 40,12" fill="#3ecf8e" opacity="0.15" stroke="#3ecf8e" stroke-width="1"/>
  </g>

  <!-- Title -->
  <text x="600" y="460" font-family="monospace" font-size="52" fill="#3ecf8e" text-anchor="middle" font-weight="bold" letter-spacing="6">CHROME PACK</text>
  <text x="600" y="495" font-family="monospace" font-size="20" fill="#9a9aaa" text-anchor="middle" letter-spacing="4">11 Components</text>

  <line x1="380" y1="510" x2="820" y2="510" stroke="#3ecf8e" stroke-width="1" opacity="0.2"/>

  <text x="600" y="570" font-family="monospace" font-size="11" fill="#555566" text-anchor="middle" letter-spacing="1">Barcode  ·  CornerOrnament  ·  DataLabel  ·  CoordLabel  ·  HexGrid...</text>
</svg>