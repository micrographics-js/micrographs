<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>text { font-family: 'JetBrains Mono', 'Courier New', monospace; }</style>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.5" fill="#555566" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#0d0e17"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <path d="M20,20 L20,50 M20,20 L50,20" stroke="#555566" stroke-width="2" fill="none"/>
  <path d="M1180,20 L1180,50 M1180,20 L1150,20" stroke="#555566" stroke-width="2" fill="none"/>
  <path d="M20,610 L20,580 M20,610 L50,610" stroke="#555566" stroke-width="2" fill="none"/>
  <path d="M1180,610 L1180,580 M1180,610 L1150,610" stroke="#555566" stroke-width="2" fill="none"/>
  <text x="40" y="50" fill="#555566" font-size="10" letter-spacing="2" opacity="0.5">MICROGRAPHICS</text>
  <text x="600" y="100" text-anchor="middle" fill="#3ecf8e" font-size="48" font-weight="700" letter-spacing="6">CHROME PACK</text>
  <text x="600" y="130" text-anchor="middle" fill="#555566" font-size="16">11 Components</text>
  <!-- Barcode -->
  <g transform="translate(100, 200)">
    <rect x="0" y="0" width="4" height="80" fill="#3ecf8e"/>
    <rect x="8" y="0" width="2" height="80" fill="#3ecf8e"/>
    <rect x="14" y="0" width="6" height="80" fill="#3ecf8e"/>
    <rect x="24" y="0" width="2" height="80" fill="#3ecf8e"/>
    <rect x="30" y="0" width="4" height="80" fill="#3ecf8e"/>
    <rect x="38" y="0" width="2" height="80" fill="#3ecf8e"/>
    <rect x="44" y="0" width="6" height="80" fill="#3ecf8e"/>
    <rect x="54" y="0" width="2" height="80" fill="#3ecf8e"/>
    <rect x="60" y="0" width="4" height="80" fill="#3ecf8e"/>
    <rect x="68" y="0" width="2" height="80" fill="#3ecf8e"/>
    <rect x="74" y="0" width="4" height="80" fill="#3ecf8e"/>
    <rect x="82" y="0" width="6" height="80" fill="#3ecf8e"/>
    <rect x="92" y="0" width="2" height="80" fill="#3ecf8e"/>
    <rect x="98" y="0" width="4" height="80" fill="#3ecf8e"/>
    <rect x="106" y="0" width="2" height="80" fill="#3ecf8e"/>
    <rect x="112" y="0" width="6" height="80" fill="#3ecf8e"/>
    <rect x="122" y="0" width="4" height="80" fill="#3ecf8e"/>
    <rect x="130" y="0" width="2" height="80" fill="#3ecf8e"/>
    <text x="65" y="100" text-anchor="middle" fill="#555566" font-size="12">BARCODE</text>
  </g>
  <!-- Corner ornaments (decorative component) -->
  <g transform="translate(400, 200)">
    <rect x="0" y="0" width="160" height="80" fill="none" stroke="#3ecf8e" stroke-width="0.5" opacity="0.3"/>
    <path d="M0,0 L0,20 M0,0 L20,0" stroke="#3ecf8e" stroke-width="2.5" fill="none"/>
    <path d="M160,0 L160,20 M160,0 L140,0" stroke="#3ecf8e" stroke-width="2.5" fill="none"/>
    <path d="M0,80 L0,60 M0,80 L20,80" stroke="#3ecf8e" stroke-width="2.5" fill="none"/>
    <path d="M160,80 L160,60 M160,80 L140,80" stroke="#3ecf8e" stroke-width="2.5" fill="none"/>
    <text x="80" y="45" text-anchor="middle" fill="#3ecf8e" font-size="14">CLASSIFIED</text>
    <text x="80" y="100" text-anchor="middle" fill="#555566" font-size="12">CORNER ORNAMENTS</text>
  </g>
  <!-- Data label -->
  <g transform="translate(700, 200)">
    <rect x="0" y="0" width="200" height="30" fill="none" stroke="#3ecf8e" stroke-width="1" rx="2"/>
    <text x="10" y="20" fill="#555566" font-size="10">SECTOR</text>
    <text x="100" y="20" fill="#3ecf8e" font-size="10">ALPHA-7</text>
    <rect x="0" y="35" width="200" height="30" fill="none" stroke="#3ecf8e" stroke-width="1" rx="2"/>
    <text x="10" y="55" fill="#555566" font-size="10">STATUS</text>
    <text x="100" y="55" fill="#3ecf8e" font-size="10">NOMINAL</text>
    <text x="100" y="90" text-anchor="middle" fill="#555566" font-size="12">DATA LABEL</text>
  </g>
  <!-- Diamond -->
  <g transform="translate(180, 400)">
    <polygon points="40,0 80,40 40,80 0,40" fill="none" stroke="#3ecf8e" stroke-width="1.5"/>
    <polygon points="40,15 65,40 40,65 15,40" fill="none" stroke="#3ecf8e" stroke-width="0.8" opacity="0.5"/>
    <text x="40" y="42" text-anchor="middle" fill="#3ecf8e" font-size="14" font-weight="700">!</text>
    <text x="40" y="100" text-anchor="middle" fill="#555566" font-size="12">DIAMOND</text>
  </g>
  <!-- Ruler -->
  <g transform="translate(400, 430)">
    <line x1="0" y1="0" x2="300" y2="0" stroke="#3ecf8e" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="0" y2="15" stroke="#3ecf8e" stroke-width="1"/>
    <line x1="60" y1="0" x2="60" y2="15" stroke="#3ecf8e" stroke-width="1"/>
    <line x1="120" y1="0" x2="120" y2="15" stroke="#3ecf8e" stroke-width="1"/>
    <line x1="180" y1="0" x2="180" y2="15" stroke="#3ecf8e" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="15" stroke="#3ecf8e" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="15" stroke="#3ecf8e" stroke-width="1"/>
    <line x1="30" y1="0" x2="30" y2="8" stroke="#3ecf8e" stroke-width="0.5"/>
    <line x1="90" y1="0" x2="90" y2="8" stroke="#3ecf8e" stroke-width="0.5"/>
    <line x1="150" y1="0" x2="150" y2="8" stroke="#3ecf8e" stroke-width="0.5"/>
    <line x1="210" y1="0" x2="210" y2="8" stroke="#3ecf8e" stroke-width="0.5"/>
    <line x1="270" y1="0" x2="270" y2="8" stroke="#3ecf8e" stroke-width="0.5"/>
    <text x="0" y="30" fill="#3ecf8e" font-size="8">0</text>
    <text x="60" y="30" fill="#3ecf8e" font-size="8">1</text>
    <text x="120" y="30" fill="#3ecf8e" font-size="8">2</text>
    <text x="180" y="30" fill="#3ecf8e" font-size="8">3</text>
    <text x="240" y="30" fill="#3ecf8e" font-size="8">4</text>
    <text x="300" y="30" fill="#3ecf8e" font-size="8">5</text>
    <text x="150" y="55" text-anchor="middle" fill="#555566" font-size="12">RULER</text>
  </g>
  <!-- Divider -->
  <g transform="translate(850, 400)">
    <line x1="0" y1="20" x2="250" y2="20" stroke="#3ecf8e" stroke-width="1" stroke-dasharray="8,4"/>
    <line x1="0" y1="50" x2="250" y2="50" stroke="#3ecf8e" stroke-width="1"/>
    <circle cx="0" cy="50" r="3" fill="#3ecf8e"/>
    <circle cx="250" cy="50" r="3" fill="#3ecf8e"/>
    <text x="125" y="85" text-anchor="middle" fill="#555566" font-size="12">DIVIDERS</text>
  </g>
  <line x1="40" y1="580" x2="1160" y2="580" stroke="#555566" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.3"/>
  <text x="600" y="600" text-anchor="middle" fill="#555566" font-size="11" letter-spacing="3">MICROGRAPHICS — CHROME PACK — 11 ANIMATED COMPONENTS</text>
</svg>