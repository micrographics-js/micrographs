<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0d0e17"/>
  <!-- Grid dots -->
  <pattern id="grid-react" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="0.5" fill="#555566" opacity="0.3"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid-react)"/>
  <!-- Corner ornaments -->
  <line x1="0" y1="30" x2="0" y2="0" stroke="#555566" stroke-width="2"/>
  <line x1="0" y1="0" x2="30" y2="0" stroke="#555566" stroke-width="2"/>
  <line x1="1170" y1="0" x2="1200" y2="0" stroke="#555566" stroke-width="2"/>
  <line x1="1200" y1="0" x2="1200" y2="30" stroke="#555566" stroke-width="2"/>
  <line x1="0" y1="600" x2="0" y2="630" stroke="#555566" stroke-width="2"/>
  <line x1="0" y1="630" x2="30" y2="630" stroke="#555566" stroke-width="2"/>
  <line x1="1200" y1="600" x2="1200" y2="630" stroke="#555566" stroke-width="2"/>
  <line x1="1170" y1="630" x2="1200" y2="630" stroke="#555566" stroke-width="2"/>
  <!-- Micrographics branding -->
  <text x="50" y="45" fill="#555566" font-family="monospace" font-size="12" letter-spacing="3">MICROGRAPHICS</text>
  <!-- Main title -->
  <text x="600" y="180" text-anchor="middle" fill="#3ecf8e" font-family="monospace" font-size="52" font-weight="bold" letter-spacing="4">REACT BUNDLE</text>
  <text x="600" y="230" text-anchor="middle" fill="#9a9aaa" font-family="monospace" font-size="24" letter-spacing="2">ALL 84 COMPONENTS</text>
  <!-- Star badge -->
  <rect x="540" y="250" width="120" height="30" rx="2" fill="none" stroke="#3ecf8e" stroke-width="1"/>
  <text x="600" y="270" text-anchor="middle" fill="#3ecf8e" font-family="monospace" font-size="14" letter-spacing="2">BEST VALUE</text>
  <!-- Component visualization row -->
  <!-- Signal bars -->
  <rect x="120" y="340" width="8" height="12" fill="#3ecf8e" opacity="0.5"/>
  <rect x="130" y="334" width="8" height="18" fill="#3ecf8e" opacity="0.65"/>
  <rect x="140" y="326" width="8" height="26" fill="#3ecf8e" opacity="0.8"/>
  <rect x="150" y="316" width="8" height="36" fill="#3ecf8e" opacity="1"/>
  <!-- Radar -->
  <circle cx="250" cy="340" r="30" fill="none" stroke="#555566" stroke-width="0.5"/>
  <circle cx="250" cy="340" r="20" fill="none" stroke="#555566" stroke-width="0.5"/>
  <line x1="250" y1="340" x2="274" y2="322" stroke="#3ecf8e" stroke-width="1.5"/>
  <circle cx="250" cy="340" r="3" fill="#3ecf8e"/>
  <!-- Gauge -->
  <path d="M 340 370 A 35 35 0 0 1 410 370" fill="none" stroke="#555566" stroke-width="1"/>
  <path d="M 340 370 A 35 35 0 0 1 398 345" fill="none" stroke="#f5a623" stroke-width="2.5"/>
  <circle cx="375" cy="370" r="3" fill="#e8e8e8"/>
  <!-- Typewriter text -->
  <text x="470" y="345" fill="#3ecf8e" font-family="monospace" font-size="16">SYSTEM·ONLINE_</text>
  <!-- Crosshair -->
  <line x1="700" y1="320" x2="700" y2="335" stroke="#3ecf8e" stroke-width="0.75"/>
  <line x1="700" y1="345" x2="700" y2="360" stroke="#3ecf8e" stroke-width="0.75"/>
  <line x1="680" y1="340" x2="695" y2="340" stroke="#3ecf8e" stroke-width="0.75"/>
  <line x1="705" y1="340" x2="720" y2="340" stroke="#3ecf8e" stroke-width="0.75"/>
  <circle cx="700" cy="340" r="10" fill="none" stroke="#3ecf8e" stroke-width="0.75"/>
  <!-- Orbit -->
  <circle cx="820" cy="340" r="25" fill="none" stroke="#555566" stroke-width="0.5" stroke-dasharray="2 2"/>
  <circle cx="820" cy="340" r="5" fill="#3ecf8e"/>
  <circle cx="842" cy="328" r="3" fill="#f5a623"/>
  <circle cx="800" cy="352" r="3" fill="#60cfff"/>
  <!-- Waveform -->
  <polyline points="900,350 915,330 930,345 945,325 960,340 975,320 990,338 1005,328 1020,342 1035,332 1050,348" fill="none" stroke="#3ecf8e" stroke-width="1.5"/>
  <!-- Pack list -->
  <text x="600" y="430" text-anchor="middle" fill="#555566" font-family="monospace" font-size="13" letter-spacing="2">SIGNALS · DATA · TEXT · CHROME · CLOCKS · GAUGES · INTERACTION · ORBIT</text>
  <text x="600" y="455" text-anchor="middle" fill="#555566" font-family="monospace" font-size="11">23 + 11 + 12 + 11 + 6 + 8 + 5 + 8 = 84 COMPONENTS</text>
  <!-- Price -->
  <text x="600" y="520" text-anchor="middle" fill="#e8e8e8" font-family="monospace" font-size="48" font-weight="bold">$79</text>
  <text x="600" y="555" text-anchor="middle" fill="#555566" font-family="monospace" font-size="14" letter-spacing="1">SAVES $113 VS INDIVIDUAL PACKS</text>
  <!-- Status dots -->
  <rect x="1100" y="590" width="8" height="8" fill="#3ecf8e"/>
  <rect x="1112" y="590" width="8" height="8" fill="#f5a623"/>
  <rect x="1124" y="590" width="8" height="8" fill="#e05252"/>
  <!-- Barcode bottom -->
  <rect x="50" y="590" width="2" height="14" fill="#555566"/>
  <rect x="54" y="590" width="1" height="14" fill="#555566"/>
  <rect x="57" y="590" width="2" height="14" fill="#555566"/>
  <rect x="61" y="590" width="1" height="14" fill="#555566"/>
  <rect x="64" y="590" width="2" height="14" fill="#555566"/>
  <rect x="68" y="590" width="1" height="14" fill="#555566"/>
  <rect x="71" y="590" width="2" height="14" fill="#555566"/>
  <rect x="75" y="590" width="1" height="14" fill="#555566"/>
  <text x="85" y="602" fill="#555566" font-family="monospace" font-size="9" letter-spacing="1">REACT 18+ · NEXT.JS COMPATIBLE · TYPESCRIPT · SVG</text>
</svg>
