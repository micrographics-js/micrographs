<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <pattern id="grid-o" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.5" fill="#1a1b2e"/>
    </pattern>
    <filter id="blur-o">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="glow-o">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0d0e17"/>
  <rect width="1200" height="630" fill="url(#grid-o)"/>

  <!-- Corner ornaments -->
  <g stroke="#555566" stroke-width="1.5" fill="none">
    <polyline points="20,50 20,20 50,20"/>
    <polyline points="1150,20 1180,20 1180,50"/>
    <polyline points="1180,580 1180,610 1150,610"/>
    <polyline points="50,610 20,610 20,580"/>
  </g>

  <text x="60" y="42" font-family="monospace" font-size="10" fill="#555566" letter-spacing="3">MICROGRAPHICS</text>

  <ellipse cx="600" cy="260" rx="400" ry="150" fill="#3ecf8e" opacity="0.015" filter="url(#blur-o)"/>

  <!-- === ORBITAL SYSTEM === -->
  <g transform="translate(230, 250)">
    <!-- Orbit paths -->
    <ellipse cx="0" cy="0" rx="120" ry="45" fill="none" stroke="#555566" stroke-width="0.5" transform="rotate(-15)"/>
    <ellipse cx="0" cy="0" rx="85" ry="35" fill="none" stroke="#555566" stroke-width="0.5" transform="rotate(25)"/>
    <ellipse cx="0" cy="0" rx="55" ry="25" fill="none" stroke="#555566" stroke-width="0.5" transform="rotate(-5)"/>

    <!-- Center body with glow -->
    <circle cx="0" cy="0" r="12" fill="#3ecf8e" opacity="0.15" filter="url(#glow-o)"/>
    <circle cx="0" cy="0" r="8" fill="#3ecf8e"/>
    <circle cx="0" cy="0" r="4" fill="#e8e8e8"/>

    <!-- Satellites on orbit 1 -->
    <circle cx="105" cy="-30" r="5" fill="#f5a623"/>
    <circle cx="105" cy="-30" r="8" fill="none" stroke="#f5a623" stroke-width="0.5" opacity="0.4"/>
    <circle cx="-90" cy="38" r="4" fill="#3ecf8e" opacity="0.6"/>

    <!-- Satellites on orbit 2 -->
    <circle cx="-70" cy="-28" r="4" fill="#e05252"/>
    <circle cx="-70" cy="-28" r="7" fill="none" stroke="#e05252" stroke-width="0.5" opacity="0.4"/>
    <circle cx="55" cy="32" r="3" fill="#e8e8e8" opacity="0.7"/>

    <!-- Satellite on orbit 3 -->
    <circle cx="48" cy="-16" r="4" fill="#3ecf8e" opacity="0.8"/>
    <circle cx="-35" cy="20" r="3" fill="#f5a623" opacity="0.5"/>

    <!-- Trail effect -->
    <path d="M105,-30 Q115,-25 118,-15" fill="none" stroke="#f5a623" stroke-width="1" opacity="0.3"/>
    <path d="M-70,-28 Q-80,-22 -82,-12" fill="none" stroke="#e05252" stroke-width="1" opacity="0.3"/>

    <!-- Labels -->
    <text x="115" y="-38" font-family="monospace" font-size="8" fill="#f5a623">SAT-03</text>
    <text x="-80" y="-36" font-family="monospace" font-size="8" fill="#e05252">SAT-07</text>

    <text x="0" y="80" font-family="monospace" font-size="11" fill="#9a9aaa" text-anchor="middle">ORBIT SYSTEM</text>
  </g>

  <!-- === CROSSHAIR TARGET === -->
  <g transform="translate(520, 240)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="55" fill="none" stroke="#555566" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#555566" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="25" fill="none" stroke="#3ecf8e" stroke-width="0.5" opacity="0.5"/>

    <!-- Crosshair lines with gaps -->
    <line x1="0" y1="-55" x2="0" y2="-12" stroke="#3ecf8e" stroke-width="1"/>
    <line x1="0" y1="12" x2="0" y2="55" stroke="#3ecf8e" stroke-width="1"/>
    <line x1="-55" y1="0" x2="-12" y2="0" stroke="#3ecf8e" stroke-width="1"/>
    <line x1="12" y1="0" x2="55" y2="0" stroke="#3ecf8e" stroke-width="1"/>

    <!-- Center dot -->
    <circle cx="0" cy="0" r="3" fill="#3ecf8e"/>

    <!-- Corner marks -->
    <polyline points="-50,-50 -50,-40" stroke="#3ecf8e" stroke-width="0.5" fill="none" opacity="0.5"/>
    <polyline points="-50,-50 -40,-50" stroke="#3ecf8e" stroke-width="0.5" fill="none" opacity="0.5"/>
    <polyline points="50,-50 50,-40" stroke="#3ecf8e" stroke-width="0.5" fill="none" opacity="0.5"/>
    <polyline points="50,-50 40,-50" stroke="#3ecf8e" stroke-width="0.5" fill="none" opacity="0.5"/>
    <polyline points="-50,50 -50,40" stroke="#3ecf8e" stroke-width="0.5" fill="none" opacity="0.5"/>
    <polyline points="-50,50 -40,50" stroke="#3ecf8e" stroke-width="0.5" fill="none" opacity="0.5"/>
    <polyline points="50,50 50,40" stroke="#3ecf8e" stroke-width="0.5" fill="none" opacity="0.5"/>
    <polyline points="50,50 40,50" stroke="#3ecf8e" stroke-width="0.5" fill="none" opacity="0.5"/>

    <!-- Coordinates -->
    <text x="0" y="75" font-family="monospace" font-size="9" fill="#555566" text-anchor="middle">X:042.7  Y:018.3</text>
    <text x="0" y="90" font-family="monospace" font-size="11" fill="#9a9aaa" text-anchor="middle">CROSSHAIR TARGET</text>
  </g>

  <!-- === RADAR RETICLE === -->
  <g transform="translate(760, 240)">
    <!-- Scanning circles -->
    <circle cx="0" cy="0" r="60" fill="none" stroke="#3ecf8e" stroke-width="0.5" opacity="0.3"/>
    <circle cx="0" cy="0" r="45" fill="none" stroke="#3ecf8e" stroke-width="0.5" opacity="0.4"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#3ecf8e" stroke-width="0.5" opacity="0.5"/>
    <circle cx="0" cy="0" r="15" fill="none" stroke="#3ecf8e" stroke-width="0.5" opacity="0.6"/>

    <!-- Radial lines -->
    <line x1="0" y1="-60" x2="0" y2="60" stroke="#555566" stroke-width="0.3"/>
    <line x1="-60" y1="0" x2="60" y2="0" stroke="#555566" stroke-width="0.3"/>
    <line x1="-42" y1="-42" x2="42" y2="42" stroke="#555566" stroke-width="0.3"/>
    <line x1="42" y1="-42" x2="-42" y2="42" stroke="#555566" stroke-width="0.3"/>

    <!-- Sweep sector (highlighted) -->
    <path d="M0,0 L42,-42 A60,60 0 0,1 60,0 Z" fill="#3ecf8e" opacity="0.06"/>

    <!-- Targets -->
    <rect x="20" y="-35" width="6" height="6" fill="#e05252" transform="rotate(45,23,-32)"/>
    <rect x="-40" y="10" width="5" height="5" fill="#f5a623" transform="rotate(45,-37.5,12.5)"/>
    <circle cx="10" cy="40" r="3" fill="#3ecf8e" opacity="0.7"/>

    <!-- Range labels -->
    <text x="48" y="-48" font-family="monospace" font-size="7" fill="#555566">200km</text>
    <text x="33" y="-33" font-family="monospace" font-size="7" fill="#555566">150km</text>

    <text x="0" y="85" font-family="monospace" font-size="11" fill="#9a9aaa" text-anchor="middle">RADAR RETICLE</text>
  </g>

  <!-- === MISSION STATUS BAR === -->
  <g transform="translate(930, 175)">
    <rect x="0" y="0" width="180" height="130" rx="4" fill="#0d0e17" stroke="#555566" stroke-width="0.5"/>

    <text x="90" y="20" font-family="monospace" font-size="10" fill="#555566" text-anchor="middle" letter-spacing="2">MISSION STATUS</text>
    <line x1="10" y1="28" x2="170" y2="28" stroke="#555566" stroke-width="0.5"/>

    <!-- Status rows -->
    <circle cx="20" cy="45" r="4" fill="#3ecf8e"/>
    <text x="32" y="49" font-family="monospace" font-size="10" fill="#e8e8e8">LAUNCH</text>
    <text x="140" y="49" font-family="monospace" font-size="10" fill="#3ecf8e">OK</text>

    <circle cx="20" cy="65" r="4" fill="#3ecf8e"/>
    <text x="32" y="69" font-family="monospace" font-size="10" fill="#e8e8e8">ORBIT</text>
    <text x="140" y="69" font-family="monospace" font-size="10" fill="#3ecf8e">OK</text>

    <circle cx="20" cy="85" r="4" fill="#f5a623"/>
    <text x="32" y="89" font-family="monospace" font-size="10" fill="#e8e8e8">DEPLOY</text>
    <text x="125" y="89" font-family="monospace" font-size="10" fill="#f5a623">WAIT</text>

    <circle cx="20" cy="105" r="4" fill="#555566"/>
    <text x="32" y="109" font-family="monospace" font-size="10" fill="#555566">DOCK</text>
    <text x="140" y="109" font-family="monospace" font-size="10" fill="#555566">--</text>

    <text x="90" y="155" font-family="monospace" font-size="11" fill="#9a9aaa" text-anchor="middle">MISSION STATUS</text>
  </g>

  <!-- Title -->
  <text x="600" y="460" font-family="monospace" font-size="48" fill="#3ecf8e" text-anchor="middle" font-weight="bold" letter-spacing="5">ORBIT &amp; NAV PACK</text>
  <text x="600" y="495" font-family="monospace" font-size="20" fill="#9a9aaa" text-anchor="middle" letter-spacing="4">8 Components</text>

  <line x1="380" y1="510" x2="820" y2="510" stroke="#3ecf8e" stroke-width="1" opacity="0.2"/>

  <text x="600" y="570" font-family="monospace" font-size="11" fill="#555566" text-anchor="middle" letter-spacing="1">OrbitSystem  ·  CrosshairTarget  ·  RadarReticle  ·  MissionStatus...</text>
</svg>