<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <pattern id="grid-d" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.5" fill="#1a1b2e"/>
    </pattern>
    <filter id="blur-d">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <clipPath id="radar-clip">
      <circle cx="0" cy="0" r="100"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0d0e17"/>
  <rect width="1200" height="630" fill="url(#grid-d)"/>

  <!-- Corner ornaments -->
  <g stroke="#555566" stroke-width="1.5" fill="none">
    <polyline points="20,50 20,20 50,20"/>
    <polyline points="1150,20 1180,20 1180,50"/>
    <polyline points="1180,580 1180,610 1150,610"/>
    <polyline points="50,610 20,610 20,580"/>
  </g>

  <!-- MICROGRAPHICS watermark -->
  <text x="60" y="42" font-family="monospace" font-size="10" fill="#555566" letter-spacing="3">MICROGRAPHICS</text>

  <!-- Glow -->
  <ellipse cx="600" cy="280" rx="400" ry="160" fill="#3ecf8e" opacity="0.015" filter="url(#blur-d)"/>

  <!-- === RADAR SWEEP === -->
  <g transform="translate(200, 240)">
    <!-- Radar rings -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="#555566" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="70" fill="none" stroke="#555566" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#555566" stroke-width="0.5"/>
    <line x1="-100" y1="0" x2="100" y2="0" stroke="#555566" stroke-width="0.5"/>
    <line x1="0" y1="-100" x2="0" y2="100" stroke="#555566" stroke-width="0.5"/>

    <!-- Sweep arm with gradient trail -->
    <g clip-path="url(#radar-clip)">
      <path d="M0,0 L-50,-87 A100,100 0 0,1 0,-100 Z" fill="#3ecf8e" opacity="0.08"/>
      <path d="M0,0 L-25,-97 A100,100 0 0,1 0,-100 Z" fill="#3ecf8e" opacity="0.15"/>
      <line x1="0" y1="0" x2="0" y2="-100" stroke="#3ecf8e" stroke-width="1.5"/>
    </g>

    <!-- Pings -->
    <circle cx="30" cy="-45" r="3" fill="#3ecf8e"/>
    <circle cx="30" cy="-45" r="6" fill="none" stroke="#3ecf8e" stroke-width="0.5" opacity="0.5"/>
    <circle cx="-50" cy="20" r="3" fill="#3ecf8e" opacity="0.6"/>
    <circle cx="65" cy="35" r="2.5" fill="#f5a623"/>
    <circle cx="-20" cy="-70" r="2" fill="#3ecf8e" opacity="0.4"/>
    <circle cx="40" cy="60" r="2" fill="#e05252"/>

    <text x="0" y="125" font-family="monospace" font-size="10" fill="#9a9aaa" text-anchor="middle">RADAR SWEEP</text>
  </g>

  <!-- === HEAT GRID === -->
  <g transform="translate(420, 175)">
    <g font-family="monospace" font-size="8" fill="#555566">
      <text x="-5" y="10" text-anchor="end">A</text>
      <text x="-5" y="30" text-anchor="end">B</text>
      <text x="-5" y="50" text-anchor="end">C</text>
      <text x="-5" y="70" text-anchor="end">D</text>
      <text x="-5" y="90" text-anchor="end">E</text>
      <text x="-5" y="110" text-anchor="end">F</text>
    </g>
    <!-- Row 1 -->
    <rect x="0" y="0" width="16" height="16" rx="1" fill="#0d2818"/>
    <rect x="20" y="0" width="16" height="16" rx="1" fill="#164d2e"/>
    <rect x="40" y="0" width="16" height="16" rx="1" fill="#3ecf8e" opacity="0.4"/>
    <rect x="60" y="0" width="16" height="16" rx="1" fill="#3ecf8e" opacity="0.7"/>
    <rect x="80" y="0" width="16" height="16" rx="1" fill="#3ecf8e"/>
    <rect x="100" y="0" width="16" height="16" rx="1" fill="#f5a623" opacity="0.8"/>
    <rect x="120" y="0" width="16" height="16" rx="1" fill="#e05252" opacity="0.6"/>
    <rect x="140" y="0" width="16" height="16" rx="1" fill="#e05252"/>
    <!-- Row 2 -->
    <rect x="0" y="20" width="16" height="16" rx="1" fill="#0d2818"/>
    <rect x="20" y="20" width="16" height="16" rx="1" fill="#0d2818"/>
    <rect x="40" y="20" width="16" height="16" rx="1" fill="#164d2e"/>
    <rect x="60" y="20" width="16" height="16" rx="1" fill="#3ecf8e" opacity="0.5"/>
    <rect x="80" y="20" width="16" height="16" rx="1" fill="#3ecf8e" opacity="0.8"/>
    <rect x="100" y="20" width="16" height="16" rx="1" fill="#f5a623" opacity="0.6"/>
    <rect x="120" y="20" width="16" height="16" rx="1" fill="#f5a623"/>
    <rect x="140" y="20" width="16" height="16" rx="1" fill="#e05252" opacity="0.7"/>
    <!-- Row 3 -->
    <rect x="0" y="40" width="16" height="16" rx="1" fill="#164d2e"/>
    <rect x="20" y="40" width="16" height="16" rx="1" fill="#3ecf8e" opacity="0.3"/>
    <rect x="40" y="40" width="16" height="16" rx="1" fill="#3ecf8e" opacity="0.6"/>
    <rect x="60" y="40" width="16" height="16" rx="1" fill="#f5a623" opacity="0.4"/>
    <rect x="80" y="40" width="16" height="16" rx="1" fill="#3ecf8e" opacity="0.5"/>
    <rect x="100" y="40" width="16" height="16" rx="1" fill="#164d2e"/>
    <rect x="120" y="40" width="16" height="16" rx="1" fill="#3ecf8e" opacity="0.3"/>
    <rect x="140" y="40" width="16" height="16" rx="1" fill="#f5a623" opacity="0.5"/>
    <!-- Row 4 -->
    <rect x="0" y="60" width="16" height="16" rx="1" fill="#3ecf8e" opacity="0.5"/>
    <rect x="20" y="60" width="16" height="16" rx="1" fill="#f5a623" opacity="0.4"/>
    <rect x="40" y="60" width="16" height="16" rx="1" fill="#e05252" opacity="0.4"/>
    <rect x="60" y="60" width="16" height="16" rx="1" fill="#f5a623" opacity="0.7"/>
    <rect x="80" y="60" width="16" height="16" rx="1" fill="#3ecf8e" opacity="0.4"/>
    <rect x="100" y="60" width="16" height="16" rx="1" fill="#164d2e"/>
    <rect x="120" y="60" width="16" height="16" rx="1" fill="#0d2818"/>
    <rect x="140" y="60" width="16" height="16" rx="1" fill="#164d2e"/>
    <!-- Row 5 -->
    <rect x="0" y="80" width="16" height="16" rx="1" fill="#f5a623" opacity="0.6"/>
    <rect x="20" y="80" width="16" height="16" rx="1" fill="#e05252" opacity="0.5"/>
    <rect x="40" y="80" width="16" height="16" rx="1" fill="#e05252" opacity="0.8"/>
    <rect x="60" y="80" width="16" height="16" rx="1" fill="#f5a623" opacity="0.5"/>
    <rect x="80" y="80" width="16" height="16" rx="1" fill="#3ecf8e" opacity="0.3"/>
    <rect x="100" y="80" width="16" height="16" rx="1" fill="#0d2818"/>
    <rect x="120" y="80" width="16" height="16" rx="1" fill="#0d2818"/>
    <rect x="140" y="80" width="16" height="16" rx="1" fill="#0d2818"/>
    <!-- Row 6 -->
    <rect x="0" y="100" width="16" height="16" rx="1" fill="#e05252" opacity="0.7"/>
    <rect x="20" y="100" width="16" height="16" rx="1" fill="#e05252"/>
    <rect x="40" y="100" width="16" height="16" rx="1" fill="#f5a623" opacity="0.8"/>
    <rect x="60" y="100" width="16" height="16" rx="1" fill="#3ecf8e" opacity="0.4"/>
    <rect x="80" y="100" width="16" height="16" rx="1" fill="#164d2e"/>
    <rect x="100" y="100" width="16" height="16" rx="1" fill="#0d2818"/>
    <rect x="120" y="100" width="16" height="16" rx="1" fill="#0d2818"/>
    <rect x="140" y="100" width="16" height="16" rx="1" fill="#164d2e"/>

    <text x="78" y="140" font-family="monospace" font-size="10" fill="#9a9aaa" text-anchor="middle">HEAT GRID</text>
  </g>

  <!-- === FREQUENCY BARS === -->
  <g transform="translate(660, 175)">
    <rect x="0" y="100" width="10" height="20" fill="#3ecf8e" opacity="0.5"/>
    <rect x="14" y="70" width="10" height="50" fill="#3ecf8e" opacity="0.6"/>
    <rect x="28" y="40" width="10" height="80" fill="#3ecf8e" opacity="0.75"/>
    <rect x="42" y="10" width="10" height="110" fill="#3ecf8e"/>
    <rect x="56" y="25" width="10" height="95" fill="#3ecf8e" opacity="0.9"/>
    <rect x="70" y="50" width="10" height="70" fill="#f5a623" opacity="0.8"/>
    <rect x="84" y="65" width="10" height="55" fill="#f5a623" opacity="0.7"/>
    <rect x="98" y="80" width="10" height="40" fill="#f5a623" opacity="0.5"/>
    <rect x="112" y="90" width="10" height="30" fill="#555566" opacity="0.6"/>
    <rect x="126" y="95" width="10" height="25" fill="#555566" opacity="0.4"/>
    <rect x="140" y="100" width="10" height="20" fill="#555566" opacity="0.3"/>
    <rect x="154" y="105" width="10" height="15" fill="#555566" opacity="0.2"/>
    <!-- Baseline -->
    <line x1="0" y1="120" x2="164" y2="120" stroke="#555566" stroke-width="0.5"/>
    <text x="82" y="140" font-family="monospace" font-size="10" fill="#9a9aaa" text-anchor="middle">FREQ BARS</text>
  </g>

  <!-- === DOT CHART === -->
  <g transform="translate(890, 175)">
    <!-- Axes -->
    <line x1="0" y1="0" x2="0" y2="120" stroke="#555566" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="180" y2="120" stroke="#555566" stroke-width="0.5"/>
    <!-- Grid lines -->
    <line x1="0" y1="30" x2="180" y2="30" stroke="#555566" stroke-width="0.3" stroke-dasharray="2,4"/>
    <line x1="0" y1="60" x2="180" y2="60" stroke="#555566" stroke-width="0.3" stroke-dasharray="2,4"/>
    <line x1="0" y1="90" x2="180" y2="90" stroke="#555566" stroke-width="0.3" stroke-dasharray="2,4"/>
    <!-- Data points -->
    <circle cx="15" cy="95" r="4" fill="#3ecf8e" opacity="0.7"/>
    <circle cx="30" cy="85" r="4" fill="#3ecf8e" opacity="0.7"/>
    <circle cx="50" cy="70" r="5" fill="#3ecf8e" opacity="0.8"/>
    <circle cx="65" cy="78" r="3" fill="#3ecf8e" opacity="0.6"/>
    <circle cx="80" cy="55" r="5" fill="#3ecf8e"/>
    <circle cx="95" cy="60" r="4" fill="#f5a623" opacity="0.8"/>
    <circle cx="110" cy="40" r="6" fill="#f5a623"/>
    <circle cx="130" cy="35" r="4" fill="#f5a623" opacity="0.7"/>
    <circle cx="145" cy="20" r="5" fill="#e05252" opacity="0.8"/>
    <circle cx="165" cy="10" r="6" fill="#e05252"/>
    <!-- Trend line -->
    <polyline points="15,95 30,85 50,70 65,78 80,55 95,60 110,40 130,35 145,20 165,10"
      fill="none" stroke="#e8e8e8" stroke-width="0.8" opacity="0.3" stroke-dasharray="3,3"/>
    <text x="90" y="140" font-family="monospace" font-size="10" fill="#9a9aaa" text-anchor="middle">DOT CHART</text>
  </g>

  <!-- Title -->
  <text x="600" y="460" font-family="monospace" font-size="52" fill="#3ecf8e" text-anchor="middle" font-weight="bold" letter-spacing="6">DATA VIZ PACK</text>
  <text x="600" y="495" font-family="monospace" font-size="20" fill="#9a9aaa" text-anchor="middle" letter-spacing="4">11 Components</text>

  <line x1="380" y1="510" x2="820" y2="510" stroke="#3ecf8e" stroke-width="1" opacity="0.2"/>

  <!-- Component names -->
  <text x="600" y="570" font-family="monospace" font-size="11" fill="#555566" text-anchor="middle" letter-spacing="1">RadarSweep  ·  WaveformLine  ·  HeatGrid  ·  FrequencyBars  ·  PacketFlow...</text>
</svg>