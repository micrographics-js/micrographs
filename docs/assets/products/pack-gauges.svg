<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>text { font-family: 'JetBrains Mono', 'Courier New', monospace; }</style>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.5" fill="#555566" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#0d0e17"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <path d="M20,20 L20,50 M20,20 L50,20" stroke="#555566" stroke-width="2" fill="none"/>
  <path d="M1180,20 L1180,50 M1180,20 L1150,20" stroke="#555566" stroke-width="2" fill="none"/>
  <path d="M20,610 L20,580 M20,610 L50,610" stroke="#555566" stroke-width="2" fill="none"/>
  <path d="M1180,610 L1180,580 M1180,610 L1150,610" stroke="#555566" stroke-width="2" fill="none"/>
  <text x="40" y="50" fill="#555566" font-size="10" letter-spacing="2" opacity="0.5">MICROGRAPHICS</text>
  <text x="600" y="100" text-anchor="middle" fill="#3ecf8e" font-size="48" font-weight="700" letter-spacing="6">GAUGES PACK</text>
  <text x="600" y="130" text-anchor="middle" fill="#555566" font-size="16">8 Components</text>
  <!-- Dial gauge (large) -->
  <g transform="translate(250, 320)">
    <path d="M-120,0 A120,120 0 0,1 120,0" stroke="#555566" stroke-width="3" fill="none"/>
    <path d="M-120,0 A120,120 0 0,1 72,-96" stroke="#3ecf8e" stroke-width="5" fill="none"/>
    <!-- Tick marks -->
    <line x1="-115" y1="-15" x2="-105" y2="-10" stroke="#555566" stroke-width="1"/>
    <line x1="-95" y1="-65" x2="-85" y2="-58" stroke="#555566" stroke-width="1"/>
    <line x1="-50" y1="-105" x2="-45" y2="-95" stroke="#555566" stroke-width="1"/>
    <line x1="0" y1="-120" x2="0" y2="-108" stroke="#555566" stroke-width="1"/>
    <line x1="50" y1="-105" x2="45" y2="-95" stroke="#555566" stroke-width="1"/>
    <line x1="95" y1="-65" x2="85" y2="-58" stroke="#555566" stroke-width="1"/>
    <line x1="115" y1="-15" x2="105" y2="-10" stroke="#555566" stroke-width="1"/>
    <!-- Needle -->
    <line x1="0" y1="0" x2="60" y2="-85" stroke="#3ecf8e" stroke-width="3"/>
    <circle cx="0" cy="0" r="6" fill="#3ecf8e"/>
    <text x="0" y="35" text-anchor="middle" fill="#3ecf8e" font-size="36" font-weight="700">72</text>
    <text x="0" y="60" text-anchor="middle" fill="#555566" font-size="12">DIAL GAUGE</text>
  </g>
  <!-- Speedometer (large) -->
  <g transform="translate(600, 320)">
    <path d="M-100,0 A100,100 0 0,1 100,0" stroke="#555566" stroke-width="3" fill="none"/>
    <path d="M-100,0 A100,100 0 0,1 50,-87" stroke="#f5a623" stroke-width="5" fill="none"/>
    <!-- Speed marks -->
    <text x="-105" y="18" fill="#555566" font-size="9">0</text>
    <text x="-80" y="-55" fill="#555566" font-size="9">20</text>
    <text x="-30" y="-92" fill="#555566" font-size="9">40</text>
    <text x="30" y="-92" fill="#555566" font-size="9">60</text>
    <text x="78" y="-55" fill="#555566" font-size="9">80</text>
    <text x="100" y="18" fill="#555566" font-size="9">100</text>
    <!-- Needle -->
    <line x1="0" y1="0" x2="40" y2="-78" stroke="#f5a623" stroke-width="3"/>
    <circle cx="0" cy="0" r="6" fill="#f5a623"/>
    <text x="0" y="35" text-anchor="middle" fill="#f5a623" font-size="36" font-weight="700">60</text>
    <text x="0" y="12" text-anchor="middle" fill="#555566" font-size="9">MPH</text>
    <text x="0" y="60" text-anchor="middle" fill="#555566" font-size="12">SPEEDOMETER</text>
  </g>
  <!-- Compass (large) -->
  <g transform="translate(950, 300)">
    <circle cx="0" cy="0" r="90" stroke="#555566" stroke-width="1.5" fill="none"/>
    <circle cx="0" cy="0" r="70" stroke="#555566" stroke-width="0.8" fill="none" opacity="0.4"/>
    <circle cx="0" cy="0" r="50" stroke="#555566" stroke-width="0.5" fill="none" opacity="0.3"/>
    <line x1="-95" y1="0" x2="95" y2="0" stroke="#555566" stroke-width="0.3"/>
    <line x1="0" y1="-95" x2="0" y2="95" stroke="#555566" stroke-width="0.3"/>
    <text x="0" y="-72" text-anchor="middle" fill="#e05252" font-size="16" font-weight="700">N</text>
    <text x="0" y="84" text-anchor="middle" fill="#555566" font-size="14">S</text>
    <text x="-78" y="5" text-anchor="middle" fill="#555566" font-size="14">W</text>
    <text x="78" y="5" text-anchor="middle" fill="#555566" font-size="14">E</text>
    <polygon points="0,-55 -8,0 8,0" fill="#e05252" opacity="0.8"/>
    <polygon points="0,55 -8,0 8,0" fill="#555566" opacity="0.5"/>
    <circle cx="0" cy="0" r="5" fill="#555566"/>
    <text x="0" y="112" text-anchor="middle" fill="#555566" font-size="12">COMPASS ROSE</text>
  </g>
  <!-- Additional gauges -->
  <g transform="translate(150, 480)">
    <rect x="0" y="0" width="200" height="16" fill="#555566" rx="3" opacity="0.3"/>
    <rect x="0" y="0" width="140" height="16" fill="#3ecf8e" rx="3"/>
    <text x="100" y="35" text-anchor="middle" fill="#555566" font-size="10">LEVEL BAR — 70%</text>
  </g>
  <g transform="translate(450, 480)">
    <rect x="0" y="0" width="200" height="16" fill="#555566" rx="3" opacity="0.3"/>
    <rect x="0" y="0" width="90" height="16" fill="#f5a623" rx="3"/>
    <text x="100" y="35" text-anchor="middle" fill="#555566" font-size="10">TEMPERATURE — 45%</text>
  </g>
  <line x1="40" y1="580" x2="1160" y2="580" stroke="#555566" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.3"/>
  <text x="600" y="600" text-anchor="middle" fill="#555566" font-size="11" letter-spacing="3">MICROGRAPHICS — GAUGES PACK — 8 ANIMATED COMPONENTS</text>
</svg>