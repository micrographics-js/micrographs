<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>text { font-family: 'JetBrains Mono', 'Courier New', monospace; }</style>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.5" fill="#555566" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#0d0e17"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <path d="M20,20 L20,50 M20,20 L50,20" stroke="#555566" stroke-width="2" fill="none"/>
  <path d="M1180,20 L1180,50 M1180,20 L1150,20" stroke="#555566" stroke-width="2" fill="none"/>
  <path d="M20,610 L20,580 M20,610 L50,610" stroke="#555566" stroke-width="2" fill="none"/>
  <path d="M1180,610 L1180,580 M1180,610 L1150,610" stroke="#555566" stroke-width="2" fill="none"/>
  <text x="40" y="50" fill="#555566" font-size="10" letter-spacing="2" opacity="0.5">MICROGRAPHICS</text>
  <text x="600" y="100" text-anchor="middle" fill="#3ecf8e" font-size="48" font-weight="700" letter-spacing="6">INTERACTION PACK</text>
  <text x="600" y="130" text-anchor="middle" fill="#555566" font-size="16">5 Components</text>
  <!-- Toggle switches -->
  <g transform="translate(150, 220)">
    <rect x="0" y="0" width="70" height="34" fill="#3ecf8e" rx="17" opacity="0.3"/>
    <circle cx="52" cy="17" r="13" fill="#3ecf8e"/>
    <text x="85" y="22" fill="#3ecf8e" font-size="14">ON</text>
    <rect x="0" y="55" width="70" height="34" fill="#555566" rx="17" opacity="0.3"/>
    <circle cx="18" cy="72" r="13" fill="#555566"/>
    <text x="85" y="77" fill="#555566" font-size="14">OFF</text>
    <text x="60" y="120" text-anchor="middle" fill="#555566" font-size="14">TOGGLE</text>
  </g>
  <!-- Stepper -->
  <g transform="translate(400, 230)">
    <rect x="0" y="0" width="50" height="50" fill="none" stroke="#3ecf8e" stroke-width="1.5" rx="4"/>
    <text x="25" y="33" text-anchor="middle" fill="#3ecf8e" font-size="24">-</text>
    <rect x="60" y="0" width="100" height="50" fill="none" stroke="#3ecf8e" stroke-width="1.5" rx="4"/>
    <text x="110" y="35" text-anchor="middle" fill="#3ecf8e" font-size="28" font-weight="700">42</text>
    <rect x="170" y="0" width="50" height="50" fill="none" stroke="#3ecf8e" stroke-width="1.5" rx="4"/>
    <text x="195" y="33" text-anchor="middle" fill="#3ecf8e" font-size="24">+</text>
    <text x="110" y="85" text-anchor="middle" fill="#555566" font-size="14">STEPPER</text>
  </g>
  <!-- Progress bar -->
  <g transform="translate(750, 230)">
    <rect x="0" y="0" width="350" height="20" fill="#555566" rx="4" opacity="0.3"/>
    <rect x="0" y="0" width="245" height="20" fill="#3ecf8e" rx="4"/>
    <text x="175" y="15" text-anchor="middle" fill="#0d0e17" font-size="10" font-weight="700">70%</text>
    <rect x="0" y="35" width="350" height="20" fill="#555566" rx="4" opacity="0.3"/>
    <rect x="0" y="35" width="157" height="20" fill="#f5a623" rx="4"/>
    <text x="175" y="50" text-anchor="middle" fill="#0d0e17" font-size="10" font-weight="700">45%</text>
    <text x="175" y="85" text-anchor="middle" fill="#555566" font-size="14">PROGRESS BAR</text>
  </g>
  <!-- Rating dots -->
  <g transform="translate(200, 420)">
    <circle cx="0" cy="0" r="14" fill="#3ecf8e"/>
    <circle cx="38" cy="0" r="14" fill="#3ecf8e"/>
    <circle cx="76" cy="0" r="14" fill="#3ecf8e"/>
    <circle cx="114" cy="0" r="14" fill="#3ecf8e"/>
    <circle cx="152" cy="0" r="14" fill="none" stroke="#555566" stroke-width="1.5"/>
    <text x="76" y="40" text-anchor="middle" fill="#555566" font-size="14">RATING — 4/5</text>
  </g>
  <!-- Slider -->
  <g transform="translate(500, 410)">
    <line x1="0" y1="0" x2="400" y2="0" stroke="#555566" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="260" y2="0" stroke="#3ecf8e" stroke-width="3" stroke-linecap="round"/>
    <circle cx="260" cy="0" r="10" fill="#3ecf8e"/>
    <text x="260" y="-18" text-anchor="middle" fill="#3ecf8e" font-size="12">65</text>
    <text x="200" y="40" text-anchor="middle" fill="#555566" font-size="14">SLIDER</text>
  </g>
  <line x1="40" y1="580" x2="1160" y2="580" stroke="#555566" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.3"/>
  <text x="600" y="600" text-anchor="middle" fill="#555566" font-size="11" letter-spacing="3">MICROGRAPHICS — INTERACTION PACK — 5 ANIMATED COMPONENTS</text>
</svg>