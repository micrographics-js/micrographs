<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0d0e17"/>
  <pattern id="grid-full" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="0.5" fill="#555566" opacity="0.3"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid-full)"/>
  <!-- Corner ornaments -->
  <line x1="0" y1="30" x2="0" y2="0" stroke="#3ecf8e" stroke-width="2"/>
  <line x1="0" y1="0" x2="30" y2="0" stroke="#3ecf8e" stroke-width="2"/>
  <line x1="1170" y1="0" x2="1200" y2="0" stroke="#3ecf8e" stroke-width="2"/>
  <line x1="1200" y1="0" x2="1200" y2="30" stroke="#3ecf8e" stroke-width="2"/>
  <line x1="0" y1="600" x2="0" y2="630" stroke="#3ecf8e" stroke-width="2"/>
  <line x1="0" y1="630" x2="30" y2="630" stroke="#3ecf8e" stroke-width="2"/>
  <line x1="1200" y1="600" x2="1200" y2="630" stroke="#3ecf8e" stroke-width="2"/>
  <line x1="1170" y1="630" x2="1200" y2="630" stroke="#3ecf8e" stroke-width="2"/>
  <text x="50" y="45" fill="#555566" font-family="monospace" font-size="12" letter-spacing="3">MICROGRAPHICS</text>
  <!-- Main title -->
  <text x="600" y="160" text-anchor="middle" fill="#3ecf8e" font-family="monospace" font-size="52" font-weight="bold" letter-spacing="4">FULL LIBRARY</text>
  <text x="600" y="210" text-anchor="middle" fill="#9a9aaa" font-family="monospace" font-size="22" letter-spacing="2">84 COMPONENTS × 4 FRAMEWORKS</text>
  <!-- Framework badges -->
  <rect x="310" y="240" width="90" height="28" rx="2" fill="none" stroke="#3ecf8e" stroke-width="1"/>
  <text x="355" y="259" text-anchor="middle" fill="#3ecf8e" font-family="monospace" font-size="12" letter-spacing="1">REACT</text>
  <rect x="410" y="240" width="90" height="28" rx="2" fill="none" stroke="#3ecf8e" stroke-width="1"/>
  <text x="455" y="259" text-anchor="middle" fill="#3ecf8e" font-family="monospace" font-size="12" letter-spacing="1">VUE 3</text>
  <rect x="510" y="240" width="90" height="28" rx="2" fill="none" stroke="#3ecf8e" stroke-width="1"/>
  <text x="555" y="259" text-anchor="middle" fill="#3ecf8e" font-family="monospace" font-size="12" letter-spacing="1">SVELTE 5</text>
  <rect x="610" y="240" width="90" height="28" rx="2" fill="none" stroke="#3ecf8e" stroke-width="1"/>
  <text x="655" y="259" text-anchor="middle" fill="#3ecf8e" font-family="monospace" font-size="12" letter-spacing="1">VANILLA</text>
  <rect x="720" y="240" width="120" height="28" rx="2" fill="none" stroke="#f5a623" stroke-width="1"/>
  <text x="780" y="259" text-anchor="middle" fill="#f5a623" font-family="monospace" font-size="12" letter-spacing="1">TAILWIND</text>
  <!-- Visual grid of component icons -->
  <!-- Row 1: signals -->
  <rect x="200" y="310" width="6" height="8" fill="#3ecf8e" opacity="0.5"/>
  <rect x="208" y="306" width="6" height="12" fill="#3ecf8e" opacity="0.7"/>
  <rect x="216" y="300" width="6" height="18" fill="#3ecf8e" opacity="0.9"/>
  <rect x="224" y="294" width="6" height="24" fill="#3ecf8e"/>
  <!-- heartbeat -->
  <polyline points="260,318 275,318 282,304 286,330 290,318 310,318" fill="none" stroke="#e05252" stroke-width="1"/>
  <!-- radar -->
  <circle cx="370" cy="316" r="18" fill="none" stroke="#555566" stroke-width="0.5"/>
  <line x1="370" y1="316" x2="384" y2="304" stroke="#3ecf8e" stroke-width="1"/>
  <circle cx="370" cy="316" r="2" fill="#3ecf8e"/>
  <!-- gauge -->
  <path d="M 420 334 A 20 20 0 0 1 460 334" fill="none" stroke="#555566" stroke-width="0.8"/>
  <path d="M 420 334 A 20 20 0 0 1 454 318" fill="none" stroke="#f5a623" stroke-width="2"/>
  <!-- text -->
  <text x="490" y="320" fill="#3ecf8e" font-family="monospace" font-size="12">ONLINE_</text>
  <!-- clock -->
  <text x="590" y="320" fill="#9a9aaa" font-family="monospace" font-size="12">14:37</text>
  <!-- crosshair -->
  <circle cx="690" cy="316" r="10" fill="none" stroke="#3ecf8e" stroke-width="0.5"/>
  <line x1="690" y1="304" x2="690" y2="328" stroke="#3ecf8e" stroke-width="0.5"/>
  <line x1="678" y1="316" x2="702" y2="316" stroke="#3ecf8e" stroke-width="0.5"/>
  <!-- orbit -->
  <circle cx="770" cy="316" r="16" fill="none" stroke="#555566" stroke-width="0.5" stroke-dasharray="2 2"/>
  <circle cx="770" cy="316" r="3" fill="#3ecf8e"/>
  <circle cx="784" cy="308" r="2" fill="#f5a623"/>
  <!-- barcode -->
  <rect x="830" y="304" width="2" height="18" fill="#555566"/>
  <rect x="834" y="304" width="1" height="18" fill="#555566"/>
  <rect x="837" y="304" width="2" height="18" fill="#555566"/>
  <rect x="841" y="304" width="1" height="18" fill="#555566"/>
  <rect x="844" y="304" width="2" height="18" fill="#555566"/>
  <!-- toggle -->
  <rect x="880" y="308" width="24" height="12" rx="2" fill="none" stroke="#3ecf8e" stroke-width="0.8"/>
  <rect x="894" y="310" width="8" height="8" rx="1" fill="#3ecf8e"/>
  <!-- waveform -->
  <polyline points="930,320 940,308 950,316 960,304 970,314 980,300 990,312" fill="none" stroke="#3ecf8e" stroke-width="1"/>
  <!-- Pack list -->
  <text x="600" y="390" text-anchor="middle" fill="#555566" font-family="monospace" font-size="12" letter-spacing="2">SIGNALS · DATA · TEXT · CHROME · CLOCKS · GAUGES · INTERACTION · ORBIT</text>
  <!-- Price section -->
  <text x="600" y="480" text-anchor="middle" fill="#e8e8e8" font-family="monospace" font-size="64" font-weight="bold">$149</text>
  <text x="600" y="520" text-anchor="middle" fill="#555566" font-family="monospace" font-size="15" letter-spacing="1">SAVES $167+ VS SEPARATE BUNDLES</text>
  <!-- Bottom -->
  <text x="600" y="570" text-anchor="middle" fill="#3ecf8e" font-family="monospace" font-size="12" letter-spacing="3">EVERY COMPONENT · EVERY FRAMEWORK · ONE PURCHASE</text>
  <rect x="1100" y="592" width="8" height="8" fill="#3ecf8e"/>
  <rect x="1112" y="592" width="8" height="8" fill="#f5a623"/>
  <rect x="1124" y="592" width="8" height="8" fill="#e05252"/>
</svg>
