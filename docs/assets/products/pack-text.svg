<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <pattern id="grid-t" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.5" fill="#1a1b2e"/>
    </pattern>
    <filter id="blur-t">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0d0e17"/>
  <rect width="1200" height="630" fill="url(#grid-t)"/>

  <!-- Corner ornaments -->
  <g stroke="#555566" stroke-width="1.5" fill="none">
    <polyline points="20,50 20,20 50,20"/>
    <polyline points="1150,20 1180,20 1180,50"/>
    <polyline points="1180,580 1180,610 1150,610"/>
    <polyline points="50,610 20,610 20,580"/>
  </g>

  <text x="60" y="42" font-family="monospace" font-size="10" fill="#555566" letter-spacing="3">MICROGRAPHICS</text>

  <!-- Glow -->
  <ellipse cx="600" cy="260" rx="400" ry="150" fill="#3ecf8e" opacity="0.015" filter="url(#blur-t)"/>

  <!-- === TYPEWRITER TEXT === -->
  <g transform="translate(100, 180)">
    <rect x="-10" y="-25" width="340" height="50" rx="3" fill="#0d0e17" stroke="#555566" stroke-width="0.5"/>
    <text x="0" y="0" font-family="monospace" font-size="24" fill="#3ecf8e" letter-spacing="2">SYSTEM·ONLINE</text>
    <!-- Cursor -->
    <rect x="296" y="-18" width="14" height="28" fill="#3ecf8e" opacity="0.8"/>
    <text x="160" y="45" font-family="monospace" font-size="10" fill="#9a9aaa" text-anchor="middle">TYPEWRITER</text>
  </g>

  <!-- === GLITCH TEXT === -->
  <g transform="translate(500, 170)">
    <!-- Glitched layers -->
    <text x="2" y="0" font-family="monospace" font-size="28" fill="#e05252" opacity="0.4" letter-spacing="3">MICROGRAPHICS</text>
    <text x="-2" y="2" font-family="monospace" font-size="28" fill="#3ecf8e" opacity="0.3" letter-spacing="3">MICROGRAPHICS</text>
    <text x="0" y="0" font-family="monospace" font-size="28" fill="#e8e8e8" letter-spacing="3">MI</text>
    <rect x="52" y="-22" width="22" height="28" fill="#3ecf8e" opacity="0.6"/>
    <text x="52" y="0" font-family="monospace" font-size="28" fill="#0d0e17" letter-spacing="3">C</text>
    <text x="74" y="0" font-family="monospace" font-size="28" fill="#e8e8e8" letter-spacing="3">RO</text>
    <rect x="130" y="-22" width="22" height="28" fill="#f5a623" opacity="0.5"/>
    <text x="152" y="0" font-family="monospace" font-size="28" fill="#e8e8e8" letter-spacing="3">RA</text>
    <rect x="206" y="-22" width="22" height="28" fill="#e05252" opacity="0.5"/>
    <text x="228" y="0" font-family="monospace" font-size="28" fill="#e8e8e8" letter-spacing="3">HICS</text>
    <!-- Scan lines -->
    <line x1="-5" y1="-8" x2="340" y2="-8" stroke="#3ecf8e" stroke-width="0.5" opacity="0.15"/>
    <line x1="-5" y1="4" x2="340" y2="4" stroke="#e05252" stroke-width="0.5" opacity="0.1"/>
    <!-- Horizontal displacement -->
    <rect x="20" y="8" width="120" height="2" fill="#e05252" opacity="0.2"/>
    <rect x="200" y="-14" width="80" height="2" fill="#3ecf8e" opacity="0.15"/>
    <text x="170" y="45" font-family="monospace" font-size="10" fill="#9a9aaa" text-anchor="middle">GLITCH TEXT</text>
  </g>

  <!-- === MATRIX RAIN === -->
  <g transform="translate(120, 240)" font-family="monospace" font-size="13" opacity="0.9">
    <!-- Column 1 -->
    <text x="0" y="0" fill="#3ecf8e" opacity="0.15">7</text>
    <text x="0" y="18" fill="#3ecf8e" opacity="0.25">A</text>
    <text x="0" y="36" fill="#3ecf8e" opacity="0.4">9</text>
    <text x="0" y="54" fill="#3ecf8e" opacity="0.6">F</text>
    <text x="0" y="72" fill="#3ecf8e" opacity="0.8">2</text>
    <text x="0" y="90" fill="#e8e8e8">K</text>
    <!-- Column 2 -->
    <text x="18" y="18" fill="#3ecf8e" opacity="0.1">B</text>
    <text x="18" y="36" fill="#3ecf8e" opacity="0.2">3</text>
    <text x="18" y="54" fill="#3ecf8e" opacity="0.35">E</text>
    <text x="18" y="72" fill="#3ecf8e" opacity="0.55">1</text>
    <text x="18" y="90" fill="#3ecf8e" opacity="0.75">D</text>
    <text x="18" y="108" fill="#e8e8e8">4</text>
    <!-- Column 3 -->
    <text x="36" y="0" fill="#3ecf8e" opacity="0.2">C</text>
    <text x="36" y="18" fill="#3ecf8e" opacity="0.3">0</text>
    <text x="36" y="36" fill="#3ecf8e" opacity="0.5">8</text>
    <text x="36" y="54" fill="#3ecf8e" opacity="0.7">6</text>
    <text x="36" y="72" fill="#e8e8e8">A</text>
    <!-- Column 4 -->
    <text x="54" y="36" fill="#3ecf8e" opacity="0.15">5</text>
    <text x="54" y="54" fill="#3ecf8e" opacity="0.3">B</text>
    <text x="54" y="72" fill="#3ecf8e" opacity="0.5">7</text>
    <text x="54" y="90" fill="#3ecf8e" opacity="0.7">2</text>
    <text x="54" y="108" fill="#3ecf8e" opacity="0.9">F</text>
    <text x="54" y="126" fill="#e8e8e8">9</text>
    <!-- Column 5 -->
    <text x="72" y="0" fill="#3ecf8e" opacity="0.25">1</text>
    <text x="72" y="18" fill="#3ecf8e" opacity="0.4">4</text>
    <text x="72" y="36" fill="#3ecf8e" opacity="0.6">C</text>
    <text x="72" y="54" fill="#3ecf8e" opacity="0.8">0</text>
    <text x="72" y="72" fill="#e8e8e8">E</text>
    <!-- Column 6 -->
    <text x="90" y="18" fill="#3ecf8e" opacity="0.1">D</text>
    <text x="90" y="36" fill="#3ecf8e" opacity="0.25">6</text>
    <text x="90" y="54" fill="#3ecf8e" opacity="0.45">3</text>
    <text x="90" y="72" fill="#3ecf8e" opacity="0.65">A</text>
    <text x="90" y="90" fill="#3ecf8e" opacity="0.85">8</text>
    <text x="90" y="108" fill="#e8e8e8">1</text>
    <text x="45" y="155" font-size="10" fill="#9a9aaa" text-anchor="middle">MATRIX RAIN</text>
  </g>

  <!-- === BINARY TEXT === -->
  <g transform="translate(330, 280)">
    <text x="0" y="0" font-family="monospace" font-size="16" fill="#3ecf8e" opacity="0.6" letter-spacing="4">01001101</text>
    <text x="10" y="22" font-family="monospace" font-size="16" fill="#3ecf8e" opacity="0.4" letter-spacing="4">01001001</text>
    <text x="20" y="44" font-family="monospace" font-size="16" fill="#3ecf8e" opacity="0.3" letter-spacing="4">01000011</text>
    <text x="5" y="66" font-family="monospace" font-size="16" fill="#3ecf8e" opacity="0.2" letter-spacing="4">01010010</text>
    <text x="90" y="95" font-family="monospace" font-size="10" fill="#9a9aaa" text-anchor="middle">BINARY = "MICR"</text>
  </g>

  <!-- === SCROLLING TEXT band === -->
  <g transform="translate(620, 270)">
    <rect x="0" y="0" width="460" height="30" rx="2" fill="#0d0e17" stroke="#555566" stroke-width="0.5"/>
    <text x="10" y="20" font-family="monospace" font-size="13" fill="#f5a623" letter-spacing="2" opacity="0.8">INCOMING TRANSMISSION ··· DECODING SIGNAL ··· BUFFER OK</text>
    <text x="230" y="55" font-family="monospace" font-size="10" fill="#9a9aaa" text-anchor="middle">SCROLLING TEXT</text>
  </g>

  <!-- === KANA TAG small === -->
  <g transform="translate(620, 340)">
    <text x="0" y="0" font-family="monospace" font-size="20" fill="#555566" letter-spacing="4" opacity="0.6">カタカナ</text>
    <text x="150" y="0" font-family="monospace" font-size="14" fill="#9a9aaa">/ KATAKANA</text>
  </g>

  <!-- Title -->
  <text x="600" y="460" font-family="monospace" font-size="52" fill="#3ecf8e" text-anchor="middle" font-weight="bold" letter-spacing="6">TEXT PACK</text>
  <text x="600" y="495" font-family="monospace" font-size="20" fill="#9a9aaa" text-anchor="middle" letter-spacing="4">12 Components</text>

  <line x1="380" y1="510" x2="820" y2="510" stroke="#3ecf8e" stroke-width="1" opacity="0.2"/>

  <text x="600" y="570" font-family="monospace" font-size="11" fill="#555566" text-anchor="middle" letter-spacing="1">Typewriter  ·  GlitchText  ·  MatrixRain  ·  ScrollingText  ·  KanaTag...</text>
</svg>