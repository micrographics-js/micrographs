<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <pattern id="grid-main" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.5" fill="#555566" opacity="0.2"/>
    </pattern>
    <filter id="glow-main">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#0d0e17"/>
  <rect width="1200" height="630" fill="url(#grid-main)"/>

  <!-- Corner ornaments -->
  <g stroke="#3ecf8e" stroke-width="2" fill="none">
    <polyline points="20,50 20,20 50,20"/>
    <polyline points="1150,20 1180,20 1180,50"/>
    <polyline points="1180,580 1180,610 1150,610"/>
    <polyline points="50,610 20,610 20,580"/>
  </g>

  <!-- Branding -->
  <text x="60" y="44" fill="#555566" font-family="monospace" font-size="11" letter-spacing="3">MICROGRAPHICS.JS</text>

  <!-- Main title -->
  <text x="600" y="130" text-anchor="middle" fill="#3ecf8e" font-family="monospace" font-size="52" font-weight="bold" letter-spacing="6">MICROGRAPHICS</text>
  <text x="600" y="170" text-anchor="middle" fill="#9a9aaa" font-family="monospace" font-size="18" letter-spacing="3">84 ANIMATED MICRO-UI COMPONENTS</text>

  <!-- Component showcase row -->
  <!-- Signal bars -->
  <g transform="translate(80, 220)">
    <rect x="0" y="30" width="8" height="12" fill="#3ecf8e" opacity="0.5"/>
    <rect x="10" y="24" width="8" height="18" fill="#3ecf8e" opacity="0.6"/>
    <rect x="20" y="16" width="8" height="26" fill="#3ecf8e" opacity="0.75"/>
    <rect x="30" y="6" width="8" height="36" fill="#3ecf8e" opacity="0.9"/>
    <rect x="40" y="0" width="8" height="42" fill="#3ecf8e"/>
  </g>

  <!-- Heartbeat -->
  <polyline points="160,248 180,248 190,232 195,262 200,248 230,248" fill="none" stroke="#e05252" stroke-width="1.5"/>

  <!-- Radar -->
  <g transform="translate(310, 240)">
    <circle cx="0" cy="0" r="30" fill="none" stroke="#555566" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="20" fill="none" stroke="#555566" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="10" fill="none" stroke="#555566" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="22" y2="-20" stroke="#3ecf8e" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="2.5" fill="#3ecf8e"/>
    <circle cx="15" cy="-12" r="2" fill="#3ecf8e" opacity="0.5"/>
  </g>

  <!-- Gauge -->
  <g transform="translate(440, 242)">
    <path d="M -30,8 A 34 34 0 0 1 30,8" fill="none" stroke="#555566" stroke-width="1"/>
    <path d="M -30,8 A 34 34 0 0 1 20,-20" fill="none" stroke="#f5a623" stroke-width="2.5"/>
    <line x1="0" y1="8" x2="16" y2="-16" stroke="#e8e8e8" stroke-width="1.2"/>
    <circle cx="0" cy="8" r="2.5" fill="#e8e8e8"/>
    <text x="0" y="28" text-anchor="middle" fill="#f5a623" font-family="monospace" font-size="10">72</text>
  </g>

  <!-- Typewriter text -->
  <text x="530" y="244" fill="#3ecf8e" font-family="monospace" font-size="14">SYSTEM·ONLINE_</text>

  <!-- Crosshair -->
  <g transform="translate(720, 240)">
    <circle cx="0" cy="0" r="16" fill="none" stroke="#3ecf8e" stroke-width="0.75"/>
    <line x1="0" y1="-22" x2="0" y2="-8" stroke="#3ecf8e" stroke-width="0.75"/>
    <line x1="0" y1="8" x2="0" y2="22" stroke="#3ecf8e" stroke-width="0.75"/>
    <line x1="-22" y1="0" x2="-8" y2="0" stroke="#3ecf8e" stroke-width="0.75"/>
    <line x1="8" y1="0" x2="22" y2="0" stroke="#3ecf8e" stroke-width="0.75"/>
    <circle cx="0" cy="0" r="3" fill="#3ecf8e"/>
  </g>

  <!-- Orbit -->
  <g transform="translate(840, 240)">
    <circle cx="0" cy="0" r="28" fill="none" stroke="#555566" stroke-width="0.5" stroke-dasharray="2 2"/>
    <circle cx="0" cy="0" r="18" fill="none" stroke="#555566" stroke-width="0.5" stroke-dasharray="2 2"/>
    <circle cx="0" cy="0" r="5" fill="#3ecf8e"/>
    <circle cx="24" cy="-12" r="3" fill="#f5a623"/>
    <circle cx="-16" cy="16" r="3" fill="#60cfff"/>
  </g>

  <!-- Waveform -->
  <polyline points="930,252 945,228 960,248 975,224 990,242 1005,220 1020,238 1035,226 1050,244 1065,232 1080,250" fill="none" stroke="#3ecf8e" stroke-width="1.5"/>

  <!-- Status dots row -->
  <g transform="translate(80, 290)">
    <rect x="0" y="0" width="6" height="6" fill="#3ecf8e"/>
    <rect x="10" y="0" width="6" height="6" fill="#3ecf8e"/>
    <rect x="20" y="0" width="6" height="6" fill="#f5a623"/>
    <rect x="30" y="0" width="6" height="6" fill="#e05252"/>
    <rect x="40" y="0" width="6" height="6" fill="#555566"/>
    <text x="56" y="7" fill="#555566" font-family="monospace" font-size="8" letter-spacing="1">SIGNALS · DATA · TEXT · CHROME · CLOCKS · GAUGES · INTERACTION · ORBIT</text>
  </g>

  <!-- Divider -->
  <line x1="80" y1="320" x2="1120" y2="320" stroke="#555566" stroke-width="0.5" stroke-dasharray="3 4"/>

  <!-- Framework badges -->
  <g transform="translate(600, 370)">
    <rect x="-260" y="-16" width="100" height="32" rx="2" fill="none" stroke="#3ecf8e" stroke-width="1"/>
    <text x="-210" y="4" text-anchor="middle" fill="#3ecf8e" font-family="monospace" font-size="13" letter-spacing="1">REACT</text>

    <rect x="-140" y="-16" width="100" height="32" rx="2" fill="none" stroke="#3ecf8e" stroke-width="1"/>
    <text x="-90" y="4" text-anchor="middle" fill="#3ecf8e" font-family="monospace" font-size="13" letter-spacing="1">VUE 3</text>

    <rect x="-20" y="-16" width="100" height="32" rx="2" fill="none" stroke="#3ecf8e" stroke-width="1"/>
    <text x="30" y="4" text-anchor="middle" fill="#3ecf8e" font-family="monospace" font-size="13" letter-spacing="1">SVELTE 5</text>

    <rect x="100" y="-16" width="100" height="32" rx="2" fill="none" stroke="#3ecf8e" stroke-width="1"/>
    <text x="150" y="4" text-anchor="middle" fill="#3ecf8e" font-family="monospace" font-size="13" letter-spacing="1">VANILLA</text>
  </g>

  <!-- Features -->
  <g transform="translate(600, 430)" text-anchor="middle" font-family="monospace" fill="#9a9aaa" font-size="12">
    <text x="0" y="0" letter-spacing="1">Pure SVG · CSS Custom Properties · TypeScript · Zero Dependencies</text>
    <text x="0" y="24" letter-spacing="1" fill="#555566">Next.js Compatible · Tailwind Plugin Included · Lifetime Updates</text>
  </g>

  <!-- Price -->
  <text x="600" y="520" text-anchor="middle" fill="#e8e8e8" font-family="monospace" font-size="72" font-weight="bold">$49</text>
  <text x="600" y="555" text-anchor="middle" fill="#555566" font-family="monospace" font-size="14" letter-spacing="2">ONE-TIME PAYMENT · LIFETIME ACCESS</text>

  <!-- Bottom bar -->
  <rect x="80" y="590" width="2" height="14" fill="#555566"/>
  <rect x="84" y="590" width="1" height="14" fill="#555566"/>
  <rect x="87" y="590" width="2" height="14" fill="#555566"/>
  <rect x="91" y="590" width="1" height="14" fill="#555566"/>
  <rect x="94" y="590" width="2" height="14" fill="#555566"/>
  <rect x="98" y="590" width="1" height="14" fill="#555566"/>
  <rect x="101" y="590" width="2" height="14" fill="#555566"/>

  <text x="1120" y="602" text-anchor="end" fill="#555566" font-family="monospace" font-size="9" letter-spacing="1.5">github.com/micrographics-js</text>

  <rect x="1100" y="590" width="6" height="6" fill="#3ecf8e"/>
  <rect x="1110" y="590" width="6" height="6" fill="#f5a623"/>
  <rect x="1120" y="590" width="6" height="6" fill="#e05252"/>
</svg>
