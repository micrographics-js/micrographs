<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <pattern id="grid-cl" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.5" fill="#1a1b2e"/>
    </pattern>
    <filter id="blur-cl">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="glow-cl">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0d0e17"/>
  <rect width="1200" height="630" fill="url(#grid-cl)"/>

  <!-- Corner ornaments -->
  <g stroke="#555566" stroke-width="1.5" fill="none">
    <polyline points="20,50 20,20 50,20"/>
    <polyline points="1150,20 1180,20 1180,50"/>
    <polyline points="1180,580 1180,610 1150,610"/>
    <polyline points="50,610 20,610 20,580"/>
  </g>

  <text x="60" y="42" font-family="monospace" font-size="10" fill="#555566" letter-spacing="3">MICROGRAPHICS</text>

  <ellipse cx="600" cy="260" rx="400" ry="150" fill="#3ecf8e" opacity="0.015" filter="url(#blur-cl)"/>

  <!-- === PIXEL CLOCK (large, prominent) === -->
  <g transform="translate(100, 150)">
    <!-- Clock container -->
    <rect x="-15" y="-15" width="340" height="90" rx="4" fill="#0d0e17" stroke="#555566" stroke-width="1"/>
    <rect x="-12" y="-12" width="334" height="84" rx="3" fill="#0a0b14"/>

    <!-- Time display with glow -->
    <text x="155" y="52" font-family="monospace" font-size="62" fill="#3ecf8e" text-anchor="middle" letter-spacing="6" filter="url(#glow-cl)" opacity="0.4">14:37:22</text>
    <text x="155" y="52" font-family="monospace" font-size="62" fill="#3ecf8e" text-anchor="middle" letter-spacing="6">14:37:22</text>

    <!-- Colon blink indicator -->
    <circle cx="-2" cy="85" r="3" fill="#3ecf8e" opacity="0.6"/>
    <text x="8" y="89" font-family="monospace" font-size="9" fill="#555566">UTC+3</text>

    <text x="155" y="105" font-family="monospace" font-size="11" fill="#9a9aaa" text-anchor="middle">PIXEL CLOCK</text>
  </g>

  <!-- === COUNTDOWN TIMER === -->
  <g transform="translate(520, 160)">
    <rect x="-10" y="-10" width="200" height="70" rx="4" fill="#0d0e17" stroke="#e05252" stroke-width="1" opacity="0.8"/>

    <!-- Time with urgency color -->
    <text x="85" y="42" font-family="monospace" font-size="48" fill="#e05252" text-anchor="middle" letter-spacing="4">04:59</text>
    <!-- Flashing indicator -->
    <circle cx="185" cy="10" r="4" fill="#e05252" opacity="0.8"/>

    <text x="85" y="80" font-family="monospace" font-size="10" fill="#9a9aaa" text-anchor="middle">T-MINUS</text>
    <text x="85" y="95" font-family="monospace" font-size="11" fill="#9a9aaa" text-anchor="middle">COUNTDOWN</text>
  </g>

  <!-- === UNIX TIMESTAMP === -->
  <g transform="translate(780, 160)">
    <rect x="-10" y="-10" width="280" height="70" rx="4" fill="#0d0e17" stroke="#555566" stroke-width="0.5"/>
    <text x="0" y="8" font-family="monospace" font-size="9" fill="#555566">UNIX EPOCH</text>
    <text x="130" y="42" font-family="monospace" font-size="36" fill="#f5a623" text-anchor="middle" letter-spacing="2">1711720000</text>
    <text x="130" y="80" font-family="monospace" font-size="10" fill="#555566" text-anchor="middle">2024-03-29T16:26:40Z</text>
    <text x="130" y="95" font-family="monospace" font-size="11" fill="#9a9aaa" text-anchor="middle">UNIX TIMESTAMP</text>
  </g>

  <!-- === PROGRESS BAR === -->
  <g transform="translate(180, 310)">
    <text x="0" y="0" font-family="monospace" font-size="10" fill="#555566">PROGRESS</text>
    <rect x="0" y="10" width="350" height="20" rx="3" fill="#1a1b2e" stroke="#555566" stroke-width="0.5"/>
    <rect x="2" y="12" width="240" height="16" rx="2" fill="#3ecf8e" opacity="0.8"/>
    <!-- Segment lines -->
    <line x1="70" y1="10" x2="70" y2="30" stroke="#0d0e17" stroke-width="1" opacity="0.5"/>
    <line x1="140" y1="10" x2="140" y2="30" stroke="#0d0e17" stroke-width="1" opacity="0.5"/>
    <line x1="210" y1="10" x2="210" y2="30" stroke="#0d0e17" stroke-width="1" opacity="0.5"/>
    <line x1="280" y1="10" x2="280" y2="30" stroke="#0d0e17" stroke-width="1" opacity="0.5"/>
    <text x="360" y="25" font-family="monospace" font-size="12" fill="#3ecf8e">68%</text>
    <text x="175" y="55" font-family="monospace" font-size="11" fill="#9a9aaa" text-anchor="middle">PROGRESS BAR</text>
  </g>

  <!-- === STOPWATCH small === -->
  <g transform="translate(650, 300)">
    <rect x="0" y="0" width="140" height="50" rx="3" fill="#0d0e17" stroke="#555566" stroke-width="0.5"/>
    <text x="70" y="20" font-family="monospace" font-size="9" fill="#555566" text-anchor="middle">ELAPSED</text>
    <text x="70" y="40" font-family="monospace" font-size="22" fill="#e8e8e8" text-anchor="middle" letter-spacing="2">02:34.87</text>
    <text x="70" y="70" font-family="monospace" font-size="11" fill="#9a9aaa" text-anchor="middle">STOPWATCH</text>
  </g>

  <!-- === TIMEZONE BAR small === -->
  <g transform="translate(850, 300)">
    <g font-family="monospace" font-size="10">
      <text x="0" y="0" fill="#555566">NYC</text>
      <text x="60" y="0" fill="#3ecf8e">08:37</text>
      <text x="0" y="18" fill="#555566">LON</text>
      <text x="60" y="18" fill="#f5a623">13:37</text>
      <text x="0" y="36" fill="#555566">TKY</text>
      <text x="60" y="36" fill="#e8e8e8">22:37</text>
    </g>
    <text x="55" y="70" font-family="monospace" font-size="11" fill="#9a9aaa" text-anchor="middle">TIMEZONE BAR</text>
  </g>

  <!-- Title -->
  <text x="600" y="460" font-family="monospace" font-size="52" fill="#3ecf8e" text-anchor="middle" font-weight="bold" letter-spacing="6">CLOCKS PACK</text>
  <text x="600" y="495" font-family="monospace" font-size="20" fill="#9a9aaa" text-anchor="middle" letter-spacing="4">6 Components</text>

  <line x1="380" y1="510" x2="820" y2="510" stroke="#3ecf8e" stroke-width="1" opacity="0.2"/>

  <text x="600" y="570" font-family="monospace" font-size="11" fill="#555566" text-anchor="middle" letter-spacing="1">PixelClock  ·  CountdownTimer  ·  StopwatchDisplay  ·  TimezoneBar...</text>
</svg>