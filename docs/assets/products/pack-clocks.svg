<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>text { font-family: 'JetBrains Mono', 'Courier New', monospace; }</style>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.5" fill="#555566" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#0d0e17"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <path d="M20,20 L20,50 M20,20 L50,20" stroke="#555566" stroke-width="2" fill="none"/>
  <path d="M1180,20 L1180,50 M1180,20 L1150,20" stroke="#555566" stroke-width="2" fill="none"/>
  <path d="M20,610 L20,580 M20,610 L50,610" stroke="#555566" stroke-width="2" fill="none"/>
  <path d="M1180,610 L1180,580 M1180,610 L1150,610" stroke="#555566" stroke-width="2" fill="none"/>
  <text x="40" y="50" fill="#555566" font-size="10" letter-spacing="2" opacity="0.5">MICROGRAPHICS</text>
  <text x="600" y="100" text-anchor="middle" fill="#3ecf8e" font-size="48" font-weight="700" letter-spacing="6">CLOCKS PACK</text>
  <text x="600" y="130" text-anchor="middle" fill="#555566" font-size="16">6 Components</text>
  <!-- Digital clock (large) -->
  <g transform="translate(100, 200)">
    <rect x="0" y="0" width="320" height="100" fill="none" stroke="#3ecf8e" stroke-width="1" rx="4"/>
    <text x="160" y="68" text-anchor="middle" fill="#3ecf8e" font-size="60" font-weight="700">14:32:07</text>
    <text x="160" y="130" text-anchor="middle" fill="#555566" font-size="14">DIGITAL CLOCK</text>
  </g>
  <!-- Countdown timer -->
  <g transform="translate(500, 200)">
    <rect x="0" y="0" width="280" height="100" fill="none" stroke="#f5a623" stroke-width="1" rx="4"/>
    <text x="140" y="38" text-anchor="middle" fill="#555566" font-size="12">COUNTDOWN</text>
    <text x="140" y="78" text-anchor="middle" fill="#f5a623" font-size="48" font-weight="700">03:42</text>
    <text x="140" y="130" text-anchor="middle" fill="#555566" font-size="14">COUNTDOWN TIMER</text>
  </g>
  <!-- Unix timestamp -->
  <g transform="translate(850, 200)">
    <rect x="0" y="0" width="260" height="100" fill="none" stroke="#3ecf8e" stroke-width="1" rx="4"/>
    <text x="130" y="38" text-anchor="middle" fill="#555566" font-size="10">UNIX EPOCH</text>
    <text x="130" y="72" text-anchor="middle" fill="#3ecf8e" font-size="28" font-weight="700">1774857600</text>
    <text x="130" y="130" text-anchor="middle" fill="#555566" font-size="14">UNIX TIMESTAMP</text>
  </g>
  <!-- Analog clock face -->
  <g transform="translate(250, 420)">
    <circle cx="0" cy="0" r="60" stroke="#3ecf8e" stroke-width="1" fill="none"/>
    <circle cx="0" cy="0" r="55" stroke="#555566" stroke-width="0.5" fill="none" opacity="0.3"/>
    <text x="0" y="-42" text-anchor="middle" fill="#3ecf8e" font-size="10">12</text>
    <text x="42" y="4" text-anchor="middle" fill="#3ecf8e" font-size="10">3</text>
    <text x="0" y="50" text-anchor="middle" fill="#3ecf8e" font-size="10">6</text>
    <text x="-42" y="4" text-anchor="middle" fill="#3ecf8e" font-size="10">9</text>
    <line x1="0" y1="0" x2="0" y2="-35" stroke="#3ecf8e" stroke-width="2"/>
    <line x1="0" y1="0" x2="25" y2="15" stroke="#3ecf8e" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="-10" y2="30" stroke="#e05252" stroke-width="0.8"/>
    <circle cx="0" cy="0" r="3" fill="#3ecf8e"/>
    <text x="0" y="80" text-anchor="middle" fill="#555566" font-size="14">ANALOG CLOCK</text>
  </g>
  <!-- Elapsed timer -->
  <g transform="translate(530, 400)">
    <text x="0" y="0" fill="#555566" font-size="10">ELAPSED</text>
    <text x="0" y="30" fill="#3ecf8e" font-size="28" font-weight="700">02:15:33.847</text>
    <rect x="0" y="45" width="200" height="4" fill="#555566" rx="2" opacity="0.3"/>
    <rect x="0" y="45" width="140" height="4" fill="#3ecf8e" rx="2"/>
    <text x="100" y="75" text-anchor="middle" fill="#555566" font-size="14">STOPWATCH</text>
  </g>
  <!-- World clock -->
  <g transform="translate(850, 390)">
    <text x="0" y="0" fill="#555566" font-size="9">NYC</text>
    <text x="80" y="0" fill="#3ecf8e" font-size="14">09:32</text>
    <text x="0" y="25" fill="#555566" font-size="9">LDN</text>
    <text x="80" y="25" fill="#3ecf8e" font-size="14">14:32</text>
    <text x="0" y="50" fill="#555566" font-size="9">TKY</text>
    <text x="80" y="50" fill="#3ecf8e" font-size="14">23:32</text>
    <text x="0" y="75" fill="#555566" font-size="9">SYD</text>
    <text x="80" y="75" fill="#3ecf8e" font-size="14">00:32</text>
    <text x="80" y="100" text-anchor="middle" fill="#555566" font-size="14">WORLD CLOCK</text>
  </g>
  <line x1="40" y1="580" x2="1160" y2="580" stroke="#555566" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.3"/>
  <text x="600" y="600" text-anchor="middle" fill="#555566" font-size="11" letter-spacing="3">MICROGRAPHICS — CLOCKS PACK — 6 ANIMATED COMPONENTS</text>
</svg>