<svg xmlns="http://www.w3.org/2000/svg" width="240" height="100" viewBox="0 0 240 100">
  <defs>
    <style>text { font-family: 'JetBrains Mono', 'Courier New', monospace; }</style>
  </defs>
  <rect width="240" height="100" fill="#13141f" rx="3"/>
  <!-- Semicircular dial gauge -->
  <path d="M20,65 A25,25 0 0,1 70,65" stroke="#555566" stroke-width="1.5" fill="none"/>
  <path d="M20,65 A25,25 0 0,1 58,42" stroke="#3ecf8e" stroke-width="2.5" fill="none"/>
  <!-- Needle -->
  <line x1="45" y1="65" x2="55" y2="44" stroke="#3ecf8e" stroke-width="1.5"/>
  <circle cx="45" cy="65" r="2" fill="#3ecf8e"/>
  <text x="45" y="76" text-anchor="middle" fill="#3ecf8e" font-size="10" font-weight="700">72</text>
  <!-- Speedometer arc -->
  <path d="M100,68 A28,28 0 0,1 156,68" stroke="#555566" stroke-width="1.5" fill="none"/>
  <path d="M100,68 A28,28 0 0,1 138,44" stroke="#f5a623" stroke-width="2.5" fill="none"/>
  <!-- Speed needle -->
  <line x1="128" y1="68" x2="134" y2="48" stroke="#f5a623" stroke-width="1.5"/>
  <circle cx="128" cy="68" r="2" fill="#f5a623"/>
  <text x="128" y="79" text-anchor="middle" fill="#f5a623" font-size="10" font-weight="700">60</text>
  <!-- Tick marks on speedometer -->
  <line x1="102" y1="66" x2="105" y2="63" stroke="#555566" stroke-width="0.5"/>
  <line x1="108" y1="54" x2="111" y2="52" stroke="#555566" stroke-width="0.5"/>
  <line x1="118" y1="44" x2="120" y2="42" stroke="#555566" stroke-width="0.5"/>
  <line x1="138" y1="44" x2="136" y2="42" stroke="#555566" stroke-width="0.5"/>
  <line x1="148" y1="54" x2="145" y2="52" stroke="#555566" stroke-width="0.5"/>
  <line x1="154" y1="66" x2="151" y2="63" stroke="#555566" stroke-width="0.5"/>
  <!-- Compass rose -->
  <circle cx="200" cy="48" r="22" stroke="#555566" stroke-width="0.8" fill="none"/>
  <circle cx="200" cy="48" r="16" stroke="#555566" stroke-width="0.5" fill="none" opacity="0.4"/>
  <!-- Cardinal directions -->
  <text x="200" y="24" text-anchor="middle" fill="#e05252" font-size="7" font-weight="700">N</text>
  <text x="200" y="78" text-anchor="middle" fill="#555566" font-size="7">S</text>
  <text x="175" y="51" text-anchor="middle" fill="#555566" font-size="7">W</text>
  <text x="225" y="51" text-anchor="middle" fill="#555566" font-size="7">E</text>
  <!-- Compass needle -->
  <polygon points="200,30 197,48 203,48" fill="#e05252" opacity="0.8"/>
  <polygon points="200,66 197,48 203,48" fill="#555566" opacity="0.5"/>
  <circle cx="200" cy="48" r="2" fill="#555566"/>
  <!-- Labels -->
  <text x="45" y="13" text-anchor="middle" fill="#555566" font-size="6">DIAL</text>
  <text x="128" y="13" text-anchor="middle" fill="#555566" font-size="6">SPEED</text>
  <text x="200" y="13" text-anchor="middle" fill="#555566" font-size="6">COMPASS</text>
  <!-- Bottom label -->
  <text x="120" y="93" text-anchor="middle" fill="#555566" font-size="7" letter-spacing="0.5">PACK 6 — GAUGES · 8 COMPONENTS</text>
</svg>